<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#141414">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ScoreReader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #141414;
      --surface:   #1e1e1e;
      --border:    #2c2c2c;
      --muted:     #555;
      --text:      #c8c8c8;
      --accent:    #5b8cf7;
      --accent-h:  #7aaeff;
      --toolbar-h: 62px;
      --nav-w:     64px;
      --font-ui:   'IBM Plex Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ─── Viewer ──────────────────────────────────────────── */
    #viewer {
      flex: 1;
      position: relative;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    #viewer::-webkit-scrollbar       { width: 6px; height: 6px; }
    #viewer::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* Grid texture — fixed so it doesn't scroll */
    #viewer-bg {
      position: fixed;
      inset: 0;
      bottom: var(--toolbar-h);
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /*
      Column flex. min-height:100% lets the spacer stretch.
      width:max-content means the container grows exactly as wide
      as the canvas — so scrollLeft can always reach 0.
      min-width:100% fills the viewer when canvas is narrow.
    */
    #scroll-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
      width: max-content;
      min-width: 100%;
      padding: 16px 16px 0;
      position: relative;
      z-index: 1;
    }

    /* Pushes canvas to the bottom of the scroll area */
    #scroll-spacer { flex: 1; min-height: 0; }

    /* ─── Canvas wrap ─────────────────────────────────────── */
    #canvas-wrap {
      position: relative;
      display: block;
      flex-shrink: 0;
    }

    #pdf-canvas {
      display: block;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 8px 40px rgba(0,0,0,0.7),
        0 2px 8px rgba(0,0,0,0.5);
    }

    #viewer.pan-mode            { cursor: grab; }
    #viewer.pan-mode.is-panning { cursor: grabbing; }

    /* ─── Empty state ─────────────────────────────────────── */
    #empty-state {
      position: fixed;
      inset: 0;
      bottom: var(--toolbar-h);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      pointer-events: none;
    }
    #empty-state > * { pointer-events: auto; }
    #empty-state.hidden { display: none; }

    .empty-icon  { font-size: 52px; opacity: 0.2; line-height: 1; }
    .empty-title { font-size: 1rem; color: var(--muted); letter-spacing: 0.02em; }
    .empty-hint  { font-size: 0.78rem; color: #333; letter-spacing: 0.02em; }

    #open-main-btn {
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      padding: 12px 28px;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.15s, transform 0.1s;
      display: inline-block;
    }
    #open-main-btn:hover  { background: var(--accent-h); }
    #open-main-btn:active { transform: scale(0.97); }

    /* ─── Drag overlay ────────────────────────────────────── */
    #drag-overlay {
      position: fixed;
      inset: 0;
      bottom: var(--toolbar-h);
      z-index: 20;
      background: rgba(91,140,247,0.08);
      border: 2px dashed var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    #drag-overlay.active { opacity: 1; pointer-events: auto; }

    /* ─── Loading ─────────────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      bottom: var(--toolbar-h);
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(20,20,20,0.75);
      backdrop-filter: blur(4px);
    }
    #loading.hidden { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    .loading-text { font-size: 0.82rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

    /* ─── Toolbar ─────────────────────────────────────────── */
    #toolbar {
      height: var(--toolbar-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-btn {
      width: var(--nav-w);
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      position: relative;
    }
    #tb-prev { border-right: 1px solid var(--border); }
    #tb-next { border-left:  1px solid var(--border); }

    .nav-btn svg {
      width: 26px; height: 26px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .nav-btn:hover:not(:disabled)  { background: rgba(255,255,255,0.06); color: #fff; }
    .nav-btn:active:not(:disabled) { background: rgba(255,255,255,0.12); }
    .nav-btn:disabled               { color: #333; cursor: default; }

    #tb-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 0 4px;
      overflow: hidden;
    }

    .tb-btn {
      background: none;
      border: none;
      color: var(--text);
      width: 38px;
      height: 42px;
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
      position: relative;
    }
    .tb-btn svg {
      width: 17px; height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tb-btn:hover:not(:disabled)  { background: rgba(255,255,255,0.07); color: #fff; }
    .tb-btn:active:not(:disabled) { background: rgba(255,255,255,0.12); }
    .tb-btn:disabled               { color: #333; cursor: default; }
    .tb-btn.active                 { color: var(--accent); }

    .tb-divider {
      width: 1px; height: 24px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    .tb-btn::after, .nav-btn::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #2a2a2a;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.7rem;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 300;
    }
    .tb-btn:hover:not(:disabled)::after,
    .nav-btn:hover:not(:disabled)::after { opacity: 1; }

    /* ─── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(var(--toolbar-h) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(30,30,30,0.95);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.8rem;
      padding: 8px 16px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 200;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="app">

  <div id="viewer">
    <div id="viewer-bg"></div>
    <div id="scroll-inner">
      <div id="scroll-spacer"></div>
      <div id="canvas-wrap">
        <canvas id="pdf-canvas"></canvas>
      </div>
    </div>
  </div>

  <div id="toolbar">
    <button class="nav-btn" id="tb-prev" data-tip="Prev  (←)" onclick="changePage(-1)" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <div id="tb-center">
      <label class="tb-btn" for="file-input" data-tip="Open PDF  (O)">
        <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
      </label>

      <div class="tb-divider"></div>

      <button class="tb-btn" id="tb-zoom-out" data-tip="Zoom Out  (−)" onclick="changeZoom(-1)" disabled>
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>

      <button class="tb-btn" id="zoom-pill" data-tip="Reset to Fit  (W)" onclick="fitToWidth()"
        style="min-width:50px;font-family:var(--font-mono);font-size:0.72rem;color:var(--muted);" disabled>—</button>

      <button class="tb-btn" id="tb-zoom-in" data-tip="Zoom In  (=)" onclick="changeZoom(1)" disabled>
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>

      <div class="tb-divider"></div>

      <button class="tb-btn" id="tb-pan" data-tip="Pan Mode  (P)" onclick="togglePan()" disabled>
        <svg viewBox="0 0 24 24"><path d="M18 11V8a2 2 0 00-4 0v1a2 2 0 00-4 0V6a2 2 0 00-4 0v6l-1.5-2a1.5 1.5 0 00-2.5 1.5l3 5A6 6 0 0011 21h3a6 6 0 006-6v-3a1 1 0 00-2 0"/></svg>
      </button>

      <button class="tb-btn" id="tb-rotate" data-tip="Rotate  (R)" onclick="rotatePage()" disabled>
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>

      <button class="tb-btn" id="tb-fs" data-tip="Fullscreen  (F)" onclick="toggleFullscreen()">
        <svg viewBox="0 0 24 24" id="fs-icon-expand">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
        <svg viewBox="0 0 24 24" id="fs-icon-shrink" style="display:none">
          <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
          <line x1="10" y1="14" x2="3" y2="21"/><line x1="14" y1="10" x2="21" y2="3"/>
        </svg>
      </button>
    </div>

    <button class="nav-btn" id="tb-next" data-tip="Next  (→)" onclick="changePage(1)" disabled>
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

</div>

<div id="empty-state">
  <div class="empty-icon">𝄞</div>
  <p class="empty-title">No score loaded</p>
  <label id="open-main-btn" for="file-input">Open PDF Score</label>
  <p class="empty-hint">or drag a PDF into this window</p>
</div>

<div id="drag-overlay">Drop PDF to open</div>
<div id="loading" class="hidden">
  <div class="spinner"></div>
  <span class="loading-text">Loading Score…</span>
</div>

<input type="file" id="file-input" accept=".pdf,application/pdf" style="display:none" onchange="handleFileInput(event)">
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

// ─── State ────────────────────────────────────────────────
let pdfDoc      = null;
let currentPage = 1;
let totalPages  = 0;
let rotation    = 0;
let renderTask  = null;

// fitScale: exact scale making page width = viewer width - padding
// zoomLevel: integer steps from fit; 0 = fit, ±n = ×/÷ ZOOM_STEP^n
let fitScale  = 1;
let zoomLevel = 0;
const ZOOM_STEP = 1.25;
const ZOOM_MIN  = -4;
const ZOOM_MAX  =  8;

function currentScale() {
  return fitScale * Math.pow(ZOOM_STEP, zoomLevel);
}

// ─── Pan state ────────────────────────────────────────────
let panMode    = false;
let isPanning  = false;
let panStartX  = 0, panStartY  = 0;
let panScrollX = 0, panScrollY = 0;

// ─── Elements ─────────────────────────────────────────────
const canvas      = document.getElementById('pdf-canvas');
const ctx         = canvas.getContext('2d');
const emptyState  = document.getElementById('empty-state');
const loadingEl   = document.getElementById('loading');
const zoomPill    = document.getElementById('zoom-pill');
const dragOverlay = document.getElementById('drag-overlay');
const viewer      = document.getElementById('viewer');

// ─── File loading ─────────────────────────────────────────
async function handleFileInput(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (file) await openFile(file);
}

async function openFile(file) {
  if (file.type !== 'application/pdf' && !file.name.endsWith('.pdf')) {
    toast('Only PDF files are supported.');
    return;
  }
  setLoading(true);
  emptyState.classList.add('hidden');
  try {
    const ab    = await file.arrayBuffer();
    pdfDoc      = await pdfjsLib.getDocument({ data: ab }).promise;
    totalPages  = pdfDoc.numPages;
    currentPage = 1;
    rotation    = 0;
    zoomLevel   = 0;
    await computeFitScale();
    await renderPage();
    updateUI();
    toast(`${file.name}  ·  ${totalPages} page${totalPages > 1 ? 's' : ''}`);
  } catch (err) {
    console.error(err);
    toast('Failed to load PDF.');
    emptyState.classList.remove('hidden');
  } finally {
    setLoading(false);
  }
}

// ─── Fit scale ────────────────────────────────────────────
async function computeFitScale() {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(currentPage);
  const vp   = page.getViewport({ scale: 1, rotation });
  // 32px total horizontal padding (16px each side in scroll-inner)
  fitScale   = (viewer.clientWidth - 32) / vp.width;
}

// ─── Rendering ────────────────────────────────────────────
async function renderPage() {
  if (!pdfDoc) return;
  if (renderTask) { try { renderTask.cancel(); } catch {} renderTask = null; }

  const page     = await pdfDoc.getPage(currentPage);
  const scale    = currentScale();
  const dpr      = window.devicePixelRatio || 1;
  const viewport = page.getViewport({ scale, rotation });

  canvas.width        = Math.floor(viewport.width  * dpr);
  canvas.height       = Math.floor(viewport.height * dpr);
  canvas.style.width  = Math.floor(viewport.width)  + 'px';
  canvas.style.height = Math.floor(viewport.height) + 'px';

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  renderTask = page.render({ canvasContext: ctx, viewport });
  try { await renderTask.promise; }
  catch (e) { if (e?.name !== 'RenderingCancelledException') console.error(e); }
  renderTask = null;
}

// ─── Page navigation ──────────────────────────────────────
async function changePage(delta) {
  if (!pdfDoc) return;
  const next = currentPage + delta;
  if (next < 1 || next > totalPages) return;
  currentPage = next;
  viewer.scrollTo(0, viewer.scrollHeight); // go to bottom (page anchored there)
  updateUI();
  await renderPage();
}

// ─── Zoom ─────────────────────────────────────────────────
async function changeZoom(delta) {
  if (!pdfDoc) return;
  const nz = zoomLevel + delta;
  if (nz < ZOOM_MIN || nz > ZOOM_MAX) return;

  // Keep the visible center point stable through zoom
  const cx   = viewer.scrollLeft + viewer.clientWidth  / 2;
  const cy   = viewer.scrollTop  + viewer.clientHeight / 2;
  const oldW = canvas.offsetWidth  || 1;
  const oldH = canvas.offsetHeight || 1;

  zoomLevel = nz;
  updateUI();
  await renderPage();

  const newW = canvas.offsetWidth;
  const newH = canvas.offsetHeight;
  viewer.scrollLeft = cx * (newW / oldW) - viewer.clientWidth  / 2;
  viewer.scrollTop  = cy * (newH / oldH) - viewer.clientHeight / 2;
}

async function fitToWidth() {
  if (!pdfDoc) return;
  await computeFitScale();
  zoomLevel = 0;
  // After render, scroll to bottom so page bottom touches toolbar
  await renderPage();
  viewer.scrollTo(0, viewer.scrollHeight);
  updateUI();
}

// ─── Rotate ───────────────────────────────────────────────
async function rotatePage() {
  if (!pdfDoc) return;
  rotation = (rotation + 90) % 360;
  await computeFitScale();
  zoomLevel = 0;
  await renderPage();
  viewer.scrollTo(0, viewer.scrollHeight);
  updateUI();
}

// ─── Pan ──────────────────────────────────────────────────
function togglePan() {
  panMode = !panMode;
  viewer.classList.toggle('pan-mode', panMode);
  document.getElementById('tb-pan').classList.toggle('active', panMode);
  toast(panMode ? 'Pan mode on' : 'Pan mode off');
}

viewer.addEventListener('pointerdown', e => {
  if (!panMode || e.button !== 0) return;
  isPanning  = true;
  panStartX  = e.clientX;
  panStartY  = e.clientY;
  panScrollX = viewer.scrollLeft;
  panScrollY = viewer.scrollTop;
  viewer.classList.add('is-panning');
  viewer.setPointerCapture(e.pointerId);
  e.preventDefault();
});

viewer.addEventListener('pointermove', e => {
  if (!isPanning) return;
  viewer.scrollLeft = panScrollX - (e.clientX - panStartX);
  viewer.scrollTop  = panScrollY - (e.clientY - panStartY);
});

viewer.addEventListener('pointerup',     () => { isPanning = false; viewer.classList.remove('is-panning'); });
viewer.addEventListener('pointercancel', () => { isPanning = false; viewer.classList.remove('is-panning'); });

// ─── Fullscreen ───────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

document.addEventListener('fullscreenchange', () => {
  const isFs = !!document.fullscreenElement;
  document.getElementById('fs-icon-expand').style.display = isFs ? 'none' : '';
  document.getElementById('fs-icon-shrink').style.display = isFs ? ''     : 'none';
  document.getElementById('tb-fs').dataset.tip = isFs ? 'Exit Fullscreen  (F)' : 'Fullscreen  (F)';
  if (pdfDoc) setTimeout(fitToWidth, 100);
});

// ─── UI ───────────────────────────────────────────────────
function updateUI() {
  const has = !!pdfDoc;
  const pct = Math.round(Math.pow(ZOOM_STEP, zoomLevel) * 100);
  zoomPill.textContent = has ? pct + '%' : '—';
  zoomPill.style.color = has ? 'var(--muted)' : '#333';

  document.getElementById('tb-prev').disabled     = !has || currentPage <= 1;
  document.getElementById('tb-next').disabled     = !has || currentPage >= totalPages;
  document.getElementById('tb-zoom-out').disabled  = !has || zoomLevel <= ZOOM_MIN;
  document.getElementById('tb-zoom-in').disabled   = !has || zoomLevel >= ZOOM_MAX;
  document.getElementById('tb-pan').disabled       = !has;
  document.getElementById('tb-rotate').disabled    = !has;
  zoomPill.disabled = !has;
}

// ─── Toast ────────────────────────────────────────────────
let toastTimer;
function toast(msg, duration = 2600) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

function setLoading(show) { loadingEl.classList.toggle('hidden', !show); }

// ─── Drag and drop ────────────────────────────────────────
let dragCounter = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; dragOverlay.classList.add('active'); });
document.addEventListener('dragleave', () => { if (--dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('active'); } });
document.addEventListener('dragover',  e => e.preventDefault());
document.addEventListener('drop', async e => {
  e.preventDefault(); dragCounter = 0; dragOverlay.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) await openFile(file);
});

// ─── Keyboard ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key) {
    case 'ArrowRight': case 'PageDown': changePage(1);  break;
    case 'ArrowLeft':  case 'PageUp':   changePage(-1); break;
    case '+': case '=': changeZoom(1);  break;
    case '-': case '_': changeZoom(-1); break;
    case 'w': case 'W': fitToWidth();   break;
    case 'r': case 'R': rotatePage();   break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'p': case 'P': if (pdfDoc) togglePan(); break;
    case 'o': case 'O': document.getElementById('file-input').click(); break;
  }
});

// ─── Resize / orientation ─────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (pdfDoc) fitToWidth(); }, 150);
});
screen.orientation?.addEventListener('change', () => {
  if (pdfDoc) setTimeout(fitToWidth, 250);
});

// ─── Init ─────────────────────────────────────────────────
