<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#141414">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ScoreReader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&family=Merriweather:wght@900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #141414;
      --surface:   #1e1e1e;
      --surface2:  #252525;
      --border:    #2c2c2c;
      --muted:     #555;
      --text:      #c8c8c8;
      --accent:    #5b8cf7;
      --accent-h:  #7aaeff;
      --danger:    #e05c5c;
      --toolbar-h: 62px;
      --nav-w:     64px;
      --font-ui:   'IBM Plex Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--font-ui); overflow: hidden;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }

    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ─── Viewer ──────────────────────────────────────────── */
    #viewer {
      flex: 1; position: relative;
      overflow: hidden; touch-action: none;
      scrollbar-width: thin; scrollbar-color: #333 transparent;
    }
    #viewer.pan-mode { overflow: auto; touch-action: auto; }
    #viewer::-webkit-scrollbar       { width: 6px; height: 6px; }
    #viewer::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    #viewer-bg {
      position: fixed; inset: 0; bottom: var(--toolbar-h);
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.35; pointer-events: none; z-index: 0;
    }

    #scroll-inner {
      display: flex; flex-direction: column; align-items: center;
      min-height: 100%; width: max-content; min-width: 100%;
      padding: 16px 16px 0; position: relative; z-index: 1;
    }
    /* In half-page mode: center the clip-wrap vertically */
    #scroll-inner.half-page-centered {
      justify-content: center;
      padding: 0 16px;
    }
    #scroll-spacer { flex: 1; min-height: 0; }

    /* ─── Canvas stack ────────────────────────────────────── */
    /* clip-wrap clips canvas-wrap to show only top or bottom half in half-page mode */
    #clip-wrap {
      position: relative; display: block; flex-shrink: 0; overflow: hidden;
    }
    /* canvas-wrap is absolute inside clip-wrap so top offset works for half-page */
    #canvas-wrap { position: absolute; top: 0; left: 0; display: block; }

    #pdf-canvas {
      display: block;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 8px 40px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.5);
    }

    /* Two annotation canvases: highlight below pen */
    #hl-canvas, #ann-canvas {
      position: absolute; top: 0; left: 0; display: block;
      pointer-events: none; touch-action: none;
    }

    #viewer.draw-mode  #ann-canvas { pointer-events: auto; cursor: crosshair; }
    #viewer.draw-mode  #hl-canvas  { pointer-events: none; }
    #viewer.hl-mode    #hl-canvas  { pointer-events: auto; cursor: crosshair; }
    #viewer.hl-mode    #ann-canvas { pointer-events: none; }
    #viewer.erase-mode  #ann-canvas { pointer-events: auto; cursor: cell; }
    #viewer.finger-mode #ann-canvas { pointer-events: auto; cursor: crosshair; }
    #viewer.pan-mode   { cursor: grab; }
    #viewer.pan-mode.is-panning { cursor: grabbing; }

    /* ─── Empty state ─────────────────────────────────────── */
    #empty-state {
      position: fixed; inset: 0; bottom: var(--toolbar-h); z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; pointer-events: none;
    }
    #empty-state > * { pointer-events: auto; }
    #empty-state.hidden { display: none; }
    .empty-icon  { font-size: 52px; opacity: 0.2; line-height: 1; }
    .empty-title { font-size: 1rem; color: var(--muted); letter-spacing: 0.02em; }
    .empty-hint  { font-size: 0.78rem; color: #333; letter-spacing: 0.02em; }
    #open-main-btn {
      background: var(--accent); color: #fff; border-radius: 8px;
      padding: 12px 28px; font-family: var(--font-ui); font-size: 0.9rem;
      font-weight: 500; cursor: pointer; letter-spacing: 0.03em;
      transition: background 0.15s, transform 0.1s; display: inline-block;
    }
    #open-main-btn:hover  { background: var(--accent-h); }
    #open-main-btn:active { transform: scale(0.97); }

    /* ─── Overlays ────────────────────────────────────────── */
    #drag-overlay {
      position: fixed; inset: 0; bottom: var(--toolbar-h); z-index: 20;
      background: rgba(91,140,247,0.08); border: 2px dashed var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: var(--accent); letter-spacing: 0.04em;
      opacity: 0; pointer-events: none; transition: opacity 0.15s;
    }
    #drag-overlay.active { opacity: 1; pointer-events: auto; }

    #loading {
      position: fixed; inset: 0; bottom: var(--toolbar-h); z-index: 30;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px;
      background: rgba(20,20,20,0.75); backdrop-filter: blur(4px);
    }
    #loading.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    .loading-text { font-size: 0.82rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

    /* ─── Toolbar ─────────────────────────────────────────── */
    #toolbar {
      height: var(--toolbar-h); background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: stretch; flex-shrink: 0; z-index: 100;
    }

    .nav-btn {
      width: var(--nav-w); flex-shrink: 0; background: none; border: none;
      color: var(--text); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: background 0.12s, color 0.12s; position: relative;
    }
    #tb-prev { border-right: 1px solid var(--border); }
    #tb-next { border-left:  1px solid var(--border); }
    .nav-btn svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .nav-btn:hover:not(:disabled)  { background: rgba(255,255,255,0.06); color: #fff; }
    .nav-btn:active:not(:disabled) { background: rgba(255,255,255,0.12); }
    .nav-btn:disabled               { color: #333; cursor: default; }

    #tb-center {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 2px; padding: 0 4px; overflow: hidden;
    }

    .tb-btn {
      background: none; border: none; color: var(--text);
      width: 38px; height: 42px; border-radius: 7px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s; flex-shrink: 0; position: relative;
    }
    .tb-btn svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    .tb-btn:hover:not(:disabled)  { background: rgba(255,255,255,0.07); color: #fff; }
    .tb-btn:active:not(:disabled) { background: rgba(255,255,255,0.12); }
    .tb-btn:disabled               { color: #333; cursor: default; }
    .tb-btn.active                 { color: var(--accent); }
    .tb-btn.active-danger          { color: var(--danger); }

    .tb-divider { width: 1px; height: 24px; background: var(--border); margin: 0 3px; flex-shrink: 0; }

    /* Active layer color dot on draw/hl buttons */
    .tb-btn .layer-dot {
      position: absolute; bottom: 5px; right: 5px;
      width: 6px; height: 6px; border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.4);
    }

    /* ─── Fingering palette (inline toolbar) ─────────────── */
    #fingering-palette {
      display: none; align-items: center; gap: 2px; flex-shrink: 0;
    }
    #fingering-palette.visible { display: flex; }
    .fng-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      width: 28px; height: 32px; cursor: pointer;
      font-family: var(--font-mono); font-size: 0.85rem; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }
    .fng-btn:hover  { background: rgba(255,255,255,0.08); }
    .fng-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Thickness +/- controls — always visible */
    #thickness-ctrl {
      display: flex; align-items: center; gap: 1px; flex-shrink: 0;
    }
    #thickness-ctrl .tb-btn { width: 28px; font-size: 1rem; font-weight: 500; }
    #thickness-val {
      font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted);
      min-width: 30px; text-align: center;
    }

    /* Tooltips */
    .tb-btn::after, .nav-btn::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%); background: #2a2a2a;
      border: 1px solid var(--border); color: var(--text);
      font-size: 0.7rem; padding: 3px 7px; border-radius: 4px;
      white-space: nowrap; pointer-events: none; opacity: 0;
      transition: opacity 0.15s; z-index: 300;
    }
    .tb-btn:hover:not(:disabled)::after,
    .nav-btn:hover:not(:disabled)::after { opacity: 1; }

    /* ─── Layers Panel ────────────────────────────────────── */
    #layers-backdrop {
      display: none; position: fixed; inset: 0; bottom: var(--toolbar-h); z-index: 98;
      background: rgba(0,0,0,0.45);
    }
    #layers-backdrop.open { display: block; }

    #layers-panel {
      position: fixed; bottom: var(--toolbar-h); left: 0; right: 0;
      z-index: 99; background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
      max-height: 60vh; display: flex; flex-direction: column;
    }
    #layers-panel.open { transform: translateY(0); }

    /* Panel handle */
    .panel-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 10px auto 0; flex-shrink: 0;
    }

    /* Tab bar */
    .panel-tabs {
      display: flex; border-bottom: 1px solid var(--border);
      flex-shrink: 0; margin-top: 8px;
    }
    .panel-tab {
      flex: 1; padding: 10px 0; text-align: center;
      font-size: 0.82rem; letter-spacing: 0.04em; color: var(--muted);
      cursor: pointer; border: none; background: none;
      border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
      text-transform: uppercase;
    }
    .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Layer list */
    .layer-list {
      overflow-y: auto; flex: 1; padding: 8px 0;
    }
    .layer-list::-webkit-scrollbar { width: 4px; }
    .layer-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .layer-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; cursor: pointer;
      transition: background 0.1s;
    }
    .layer-row:hover { background: rgba(255,255,255,0.04); }
    .layer-row.active-layer { background: rgba(91,140,247,0.1); }

    .layer-swatch {
      width: 16px; height: 16px; border-radius: 50%;
      flex-shrink: 0; border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
    }

    .layer-name {
      flex: 1; font-size: 0.85rem; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .layer-name-input {
      flex: 1; font-size: 0.85rem; color: var(--text);
      background: var(--surface2); border: 1px solid var(--accent);
      border-radius: 4px; padding: 2px 6px; outline: none;
      font-family: var(--font-ui);
    }

    .layer-vis {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 4px; flex-shrink: 0;
      display: flex; align-items: center;
    }
    .layer-vis:hover { color: var(--text); }
    .layer-vis svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .layer-vis.hidden-layer { color: #333; }

    .layer-del {
      background: none; border: none; color: #333;
      cursor: pointer; padding: 4px; flex-shrink: 0;
      display: flex; align-items: center;
    }
    .layer-del:hover { color: var(--danger); }
    .layer-del svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; }

    /* Add layer + footer */
    .panel-footer {
      border-top: 1px solid var(--border); padding: 10px 16px;
      display: flex; gap: 8px; flex-shrink: 0;
    }
    .add-layer-btn {
      flex: 1; padding: 8px; background: none;
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); font-size: 0.82rem; cursor: pointer;
      letter-spacing: 0.03em; transition: border-color 0.15s, color 0.15s;
    }
    .add-layer-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Color picker popup */
    #color-picker-popup {
      position: fixed; z-index: 200;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px;
      display: none; flex-wrap: wrap; gap: 6px; width: 168px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    #color-picker-popup.open { display: flex; }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #fff; }

    /* ─── Half-page split UI ─────────────────────────────── */
    /* Split line — fixed overlay, always above the score and toolbar */
    #split-line {
      display: none;
      position: fixed; left: 0; right: 0;
      height: 3px; background: var(--accent);
      cursor: ns-resize; z-index: 200;
      box-shadow: 0 1px 6px rgba(91,140,247,0.6);
      pointer-events: auto;
    }
    #split-line::before {
      content: ''; position: absolute;
      left: 0; right: 0; top: -12px; bottom: -12px;
    }
    #split-line.visible { display: block; }

    #split-nudge {
      display: none;
      position: fixed; right: 90px;
      transform: translateY(-50%);
      z-index: 201; gap: 4px; align-items: center;
    }
    #split-nudge.visible { display: flex; }
    .nudge-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 5px; width: 30px; height: 26px;
      font-size: 0.9rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.1s; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .nudge-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ─── Edge tap navigation zones ─────────────────────── */
    .edge-nav {
      position: fixed; top: 0; bottom: var(--toolbar-h);
      width: 12.5vw; /* 1/8 of viewport */
      z-index: 50; cursor: pointer;
      /* Completely invisible — no background, no border */
      -webkit-tap-highlight-color: transparent;
    }
    #edge-prev { left: 0; }
    #edge-next { right: 0; }

    /* ─── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: calc(var(--toolbar-h) + 12px); left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(30,30,30,0.95); border: 1px solid var(--border);
      color: var(--text); font-size: 0.8rem; padding: 8px 16px;
      border-radius: 6px; pointer-events: none; opacity: 0;
      transition: opacity 0.2s, transform 0.2s; z-index: 400;
      white-space: nowrap; letter-spacing: 0.02em;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="app">
  <div id="viewer">
    <div id="viewer-bg"></div>
    <div id="scroll-inner">
      <div id="scroll-spacer"></div>
      <div id="clip-wrap">
        <div id="canvas-wrap">
          <canvas id="pdf-canvas"></canvas>
          <canvas id="hl-canvas"></canvas>
          <canvas id="ann-canvas"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div id="toolbar">
    <button class="nav-btn" id="tb-prev" data-tip="Prev (←)" onclick="changePage(-1)" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <div id="tb-center">
      <!-- Open -->
      <label class="tb-btn" for="file-input" data-tip="Open (O)">
        <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
      </label>

      <div class="tb-divider"></div>

      <!-- Zoom -->
      <button class="tb-btn" id="tb-zoom-out" data-tip="Zoom Out (−)" onclick="changeZoom(-1)" disabled>
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="tb-btn" id="zoom-pill" data-tip="Fit Width (W)" onclick="fitToWidth()"
        style="min-width:46px;font-family:var(--font-mono);font-size:0.72rem;color:var(--muted);" disabled>—</button>
      <button class="tb-btn" id="tb-zoom-in" data-tip="Zoom In (=)" onclick="changeZoom(1)" disabled>
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>

      <!-- Page number -->
      <span id="page-pill" style="font-family:var(--font-mono);font-size:0.72rem;color:var(--muted);min-width:44px;text-align:center;flex-shrink:0;">—</span>

      <div class="tb-divider"></div>

      <!-- Draw (pen) -->
      <button class="tb-btn" id="tb-draw" data-tip="Pen (D)" onclick="setMode('draw')" disabled>
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span class="layer-dot" id="pen-dot"></span>
      </button>

      <!-- Highlight -->
      <button class="tb-btn" id="tb-hl" data-tip="Highlight (H)" onclick="setMode('hl')" disabled>
        <svg viewBox="0 0 24 24"><path d="M9 7l2 2-6 6 3 3 6-6 2 2 4-4-7-7-4 4z"/><line x1="3" y1="21" x2="9" y2="15"/></svg>
        <span class="layer-dot" id="hl-dot"></span>
      </button>

      <!-- Layers panel -->
      <button class="tb-btn" id="tb-layers" data-tip="Layers (L)" onclick="toggleLayersPanel()" disabled>
        <svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      </button>

      <!-- Fingering mode -->
      <button class="tb-btn" id="tb-finger" data-tip="Fingering (N)" onclick="setMode('finger')" disabled>
        <svg viewBox="0 0 24 24" style="font-size:0" fill="none"><text x="4" y="17" font-family="monospace" font-size="13" fill="currentColor">12</text></svg>
      </button>

      <!-- Fingering palette (shown when finger mode active) -->
      <div id="fingering-palette">
        <button class="fng-btn active" id="fng-1" onclick="selectFingering('1')">1</button>
        <button class="fng-btn" id="fng-2" onclick="selectFingering('2')">2</button>
        <button class="fng-btn" id="fng-3" onclick="selectFingering('3')">3</button>
        <button class="fng-btn" id="fng-4" onclick="selectFingering('4')">4</button>
        <button class="fng-btn" id="fng-5" onclick="selectFingering('5')">5</button>
      </div>

      <!-- Thickness +/- -->
      <div id="thickness-ctrl">
        <button class="tb-btn" data-tip="Thinner" onclick="changeThickness(-0.5)" style="width:24px;">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <span id="thickness-val">3</span>
        <button class="tb-btn" data-tip="Thicker" onclick="changeThickness(0.5)" style="width:24px;">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <div class="tb-divider"></div>

      <!-- Undo -->
      <button class="tb-btn" id="tb-undo" data-tip="Undo (Z)" onclick="undoLast()" disabled>
        <svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
      </button>

      <!-- Eraser -->
      <button class="tb-btn" id="tb-erase" data-tip="Eraser (E)" onclick="setMode('erase')" disabled>
        <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6 11l7 7"/></svg>
      </button>


      <div class="tb-divider"></div>

      <!-- Half-page -->
      <button class="tb-btn" id="tb-half" data-tip="Half Page (V)" onclick="toggleHalfPage()" disabled>
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="12" y1="3" x2="12" y2="12"/></svg>
      </button>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const ZOOM_STEP = 1.25;
const ZOOM_MIN  = -4;
const ZOOM_MAX  =  8;
const MAX_LAYERS = 10;
const ERASE_RADIUS_NORM = 0.015;
const HL_ALPHA = 0.35;
const HL_WIDTH_MULT = 8; // highlighter is 8× the stroke thickness

const PALETTE = [
  '#000000','#1e1e1e','#6b7280','#ffffff',
  '#1d4ed8','#6366f1','#0891b2','#0284c7',
  '#059669','#16a34a','#65a30d','#ca8a04',
  '#ea580c','#dc2626','#db2777','#9333ea'
];

const HL_PALETTE = [
  '#fde047','#fbbf24','#86efac','#34d399',
  '#67e8f9','#60a5fa','#f9a8d4','#fb7185',
  '#fdba74','#bef264','#a5f3fc','#c084fc',
  '#f97316','#4ade80','#22d3ee','#e879f9'
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let pdfDoc      = null;
let currentPage = 1;
let totalPages  = 0;
let rotation    = 0;
let renderTask  = null;

// ── Page render cache ─────────────────────────────────────
// Caches rendered pages as ImageBitmap keyed by "page:scale:rotation"
// Holds prev, current, next. Invalidated on zoom/rotate.
const pageCache = new Map();
const CACHE_MAX = 3;
let   cacheKey  = '';   // current zoom+rotation key prefix

function getCacheKey(pageNum) {
  return `${pageNum}:${currentScale().toFixed(4)}:${rotation}`;
}

function invalidateCache() {
  pageCache.clear();
}

async function renderPageToCache(pageNum) {
  const key = getCacheKey(pageNum);
  if (pageCache.has(key)) return; // already cached
  try {
    const page     = await pdfDoc.getPage(pageNum);
    const scale    = currentScale();
    const dpr      = window.devicePixelRatio || 1;
    const viewport = page.getViewport({ scale, rotation });
    const cssW     = Math.floor(viewport.width);
    const cssH     = Math.floor(viewport.height);
    const offscreen = new OffscreenCanvas(cssW * dpr, cssH * dpr);
    const ctx       = offscreen.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const task = page.render({ canvasContext: ctx, viewport });
    await task.promise;
    const bitmap = await createImageBitmap(offscreen);
    // Evict oldest if over limit
    if (pageCache.size >= CACHE_MAX) {
      const firstKey = pageCache.keys().next().value;
      pageCache.get(firstKey)?.close?.();
      pageCache.delete(firstKey);
    }
    pageCache.set(key, { bitmap, cssW, cssH });
  } catch(e) {
    if (e?.name !== 'RenderingCancelledException') console.error('Cache render error:', e);
  }
}

// Pre-render adjacent pages in the background (non-blocking)
function prefetchAdjacentPages() {
  if (!pdfDoc) return;
  setTimeout(async () => {
    if (currentPage > 1)           await renderPageToCache(currentPage - 1);
    if (currentPage < totalPages)  await renderPageToCache(currentPage + 1);
  }, 200); // small delay so current page paint completes first
}
let pdfHash     = null;

let fitScale  = 1;
let zoomLevel = 0;
function currentScale() { return fitScale * Math.pow(ZOOM_STEP, zoomLevel); }
// Stroke render scale: full fit-scale but only sqrt of zoom factor,
// so strokes don't grow/shrink as aggressively when zooming in/out.
function strokeScale() {
  const zoomFactor = Math.pow(ZOOM_STEP, zoomLevel);
  return fitScale * Math.sqrt(zoomFactor);
}

// mode: 'none' | 'draw' | 'hl' | 'erase' | 'pan'
let mode = 'none';
let lastDrawMode = 'none'; // restored when pan is toggled off
let edgeNavEnabled = true;  // toggleable edge tap navigation

// Pan
let isPanning  = false;
let panStartX  = 0, panStartY  = 0;
let panScrollX = 0, panScrollY = 0;

// ── Layer state ───────────────────────────────────────────
// layers.pen = [ { id, name, color, visible } ]
// layers.hl  = [ { id, name, color, visible } ]
// activePenLayer / activeHlLayer = index into their array
// strokes stored per-layer:
// annotations[pageNum][layerId] = [ stroke, … ]
// stroke = { thickness, color, isHl, points: [{x,y}] }

let layers = { pen: [], hl: [] };
let activePenLayer = -1; // index, -1 = none
let activeHlLayer  = -1;
let layerPanelTab  = 'pen'; // 'pen' | 'hl'

let annotations   = {};
let currentStroke = null;
let strokeThickness = 3;
let activeFingeringChar = '1'; // currently selected fingering digit
const FINGERING_SIZE = 13; // base px at fit zoom (normalized on save)
let fingerTouchNorm   = null;
let fingerPrevButtons = 0;

// Undo stack: array of {page, layerId, index} for last annotation per action
let undoStack = [];

// ── Half-page state ──────────────────────────────────────
let halfPageMode = false;
let halfPageSide = 'top'; // 'top' | 'bottom'
let splitRatios  = {}; // page-keyed: splitRatios[pageNum] = { top: 0-1, bottom: 0-1 }
// top   = where the top-half clip ends (fraction of page height)
// bottom = where the bottom-half clip starts (same point by default, can differ)
function getPageSplit() {
  const k = String(currentPage);
  if (!splitRatios[k]) splitRatios[k] = { top: 0.5, bottom: 0.5 };
  return splitRatios[k];
}
function getSplitRatio() {
  const s = getPageSplit();
  return halfPageSide === 'bottom' ? s.bottom : s.top;
}
function setSplitRatio(v) {
  const k = String(currentPage);
  if (!splitRatios[k]) splitRatios[k] = { top: 0.5, bottom: 0.5 };
  const clamped = Math.min(0.92, Math.max(0.08, v));
  if (halfPageSide === 'top' || !halfPageMode) {
    splitRatios[k].top    = clamped;
    splitRatios[k].bottom = clamped; // keep in sync unless independently set
  } else {
    splitRatios[k].bottom = clamped;
  }
}
let layerIdCounter  = 1;

// ═══════════════════════════════════════════════════════════
// ELEMENTS
// ═══════════════════════════════════════════════════════════
const pdfCanvas   = document.getElementById('pdf-canvas');
const pdfCtx      = pdfCanvas.getContext('2d');
const hlCanvas    = document.getElementById('hl-canvas');
const hlCtx       = hlCanvas.getContext('2d');
const annCanvas   = document.getElementById('ann-canvas');
const annCtx      = annCanvas.getContext('2d');
const emptyState  = document.getElementById('empty-state');
const loadingEl   = document.getElementById('loading');
const zoomPill    = document.getElementById('zoom-pill');
const dragOverlay = document.getElementById('drag-overlay');
const viewer      = document.getElementById('viewer');

// ═══════════════════════════════════════════════════════════
// INDEXEDDB
// ═══════════════════════════════════════════════════════════
const DB_NAME    = 'ScoreReader';
const DB_VERSION = 3;
const STORE_ANN    = 'annotations';
const STORE_LAYERS = 'layers';
const STORE_SPLIT  = 'splitRatios';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_ANN))    d.createObjectStore(STORE_ANN);
      if (!d.objectStoreNames.contains(STORE_LAYERS)) d.createObjectStore(STORE_LAYERS);
      if (!d.objectStoreNames.contains(STORE_SPLIT))  d.createObjectStore(STORE_SPLIT);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function dbGet(store, key) {
  if (!db) return null;
  return new Promise((resolve, reject) => {
    const req = db.transaction(store, 'readonly').objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror   = () => reject(req.error);
  });
}

async function dbPut(store, key, value) {
  if (!db) return;
  return new Promise((resolve, reject) => {
    const req = db.transaction(store, 'readwrite').objectStore(store).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

// ═══════════════════════════════════════════════════════════
// CONTENT HASH
// ═══════════════════════════════════════════════════════════
async function computeHash(ab) {
  const buf = await crypto.subtle.digest('SHA-1', ab.slice(0, 65536));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ═══════════════════════════════════════════════════════════
// FILE LOADING
// ═══════════════════════════════════════════════════════════
async function handleFileInput(e) {
  const file = e.target.files[0]; e.target.value = '';
  if (file) await openFile(file);
}

async function openFile(file) {
  if (file.type !== 'application/pdf' && !file.name.endsWith('.pdf')) {
    toast('Only PDF files are supported.'); return;
  }
  setLoading(true);
  emptyState.classList.add('hidden');
  try {
    const ab    = await file.arrayBuffer();
    pdfHash     = await computeHash(ab);
    pdfDoc      = await pdfjsLib.getDocument({ data: ab }).promise;
    totalPages  = pdfDoc.numPages;
    currentPage = 1; rotation = 0; zoomLevel = 0;

    // Load saved data
    const savedAnn    = await dbGet(STORE_ANN,    pdfHash);
    const savedLayers = await dbGet(STORE_LAYERS, pdfHash);
    const savedSplit  = await dbGet(STORE_SPLIT,  pdfHash);
    splitRatios = (savedSplit != null && typeof savedSplit === 'object') ? savedSplit : {};
    undoStack = [];
    invalidateCache();
    annotations = savedAnn    || {};
    if (savedLayers) {
      layers = savedLayers.layers || { pen: [], hl: [] };
      layerIdCounter = savedLayers.idCounter || 1;
      activePenLayer = layers.pen.length > 0 ? 0 : -1;
      activeHlLayer  = layers.hl.length  > 0 ? 0 : -1;
    } else {
      layers = { pen: [], hl: [] };
      activePenLayer = -1; activeHlLayer = -1;
    }

    await computeFitScale();
    await renderPage();
    redrawAnnotations();
    applyHalfPageClip();
    updateUI(); updateLayerDots();
    toast(`${file.name}  ·  ${totalPages} page${totalPages > 1 ? 's' : ''}`);
  } catch (err) {
    console.error(err); toast('Failed to load PDF.');
    emptyState.classList.remove('hidden');
  } finally { setLoading(false); }
}

// ═══════════════════════════════════════════════════════════
// FIT SCALE
// ═══════════════════════════════════════════════════════════
async function computeFitScale() {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(currentPage);
  const vp   = page.getViewport({ scale: 1, rotation });
  fitScale   = (viewer.clientWidth - 32) / vp.width;
  invalidateCache(); // zoom/rotation changed, cached bitmaps are stale
}

// ═══════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════
async function renderPage() {
  if (!pdfDoc) return;
  if (renderTask) { try { renderTask.cancel(); } catch {} renderTask = null; }

  const dpr = window.devicePixelRatio || 1;
  const key = getCacheKey(currentPage);

  if (pageCache.has(key)) {
    // Cache hit — blit instantly
    const { bitmap, cssW, cssH } = pageCache.get(key);
    for (const cv of [pdfCanvas, hlCanvas, annCanvas]) {
      cv.width = cssW * dpr; cv.height = cssH * dpr;
      cv.style.width = cssW + 'px'; cv.style.height = cssH + 'px';
    }
    pdfCtx.setTransform(1, 0, 0, 1, 0, 0);
    pdfCtx.drawImage(bitmap, 0, 0);
    prefetchAdjacentPages();
    return;
  }

  // Cache miss — render normally then cache result
  const page     = await pdfDoc.getPage(currentPage);
  const scale    = currentScale();
  const viewport = page.getViewport({ scale, rotation });
  const cssW     = Math.floor(viewport.width);
  const cssH     = Math.floor(viewport.height);

  for (const cv of [pdfCanvas, hlCanvas, annCanvas]) {
    cv.width = cssW * dpr; cv.height = cssH * dpr;
    cv.style.width = cssW + 'px'; cv.style.height = cssH + 'px';
  }
  pdfCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  renderTask = page.render({ canvasContext: pdfCtx, viewport });
  try { await renderTask.promise; }
  catch (e) { if (e?.name !== 'RenderingCancelledException') console.error(e); return; }
  renderTask = null;

  // Cache the result as an ImageBitmap for instant future use
  try {
    const bitmap = await createImageBitmap(pdfCanvas);
    if (pageCache.size >= CACHE_MAX) {
      const firstKey = pageCache.keys().next().value;
      pageCache.get(firstKey)?.close?.();
      pageCache.delete(firstKey);
    }
    pageCache.set(key, { bitmap, cssW, cssH });
  } catch(e) { /* ImageBitmap not critical */ }

  prefetchAdjacentPages();
}

// ═══════════════════════════════════════════════════════════
// HALF-PAGE CLIPPING
// ═══════════════════════════════════════════════════════════

function applyHalfPageClip() {
  const clipWrap   = document.getElementById('clip-wrap');
  const canvasWrap = document.getElementById('canvas-wrap');
  const splitLine  = document.getElementById('split-line');
  const splitNudge = document.getElementById('split-nudge');
  const scrollInner = document.getElementById('scroll-inner');
  const scrollSpacer = document.getElementById('scroll-spacer');
  const canvasW    = pdfCanvas.offsetWidth;
  const canvasH    = pdfCanvas.offsetHeight;

  clipWrap.style.width = canvasW + 'px';

  if (!halfPageMode || !pdfDoc) {
    clipWrap.style.height = canvasH + 'px';
    canvasWrap.style.top  = '0px';
    splitLine.classList.remove('visible');
    splitNudge.classList.remove('visible');
    // Restore bottom-anchor layout
    scrollInner.classList.remove('half-page-centered');
    scrollSpacer.style.display = '';
    return;
  }

  // Switch to centered layout for half-page mode
  scrollInner.classList.add('half-page-centered');
  scrollSpacer.style.display = 'none';

  const s       = getPageSplit();
  const topPx    = Math.round(canvasH * s.top);
  const bottomPx = Math.round(canvasH * s.bottom);

  if (halfPageSide === 'top') {
    clipWrap.style.height = topPx + 'px';
    canvasWrap.style.top  = '0px';
  } else {
    clipWrap.style.height = (canvasH - bottomPx) + 'px';
    canvasWrap.style.top  = '-' + bottomPx + 'px';
  }

  if (nudgeVisible) {
    const clipRect = clipWrap.getBoundingClientRect();
    const screenY  = clipRect.bottom;
    splitLine.style.top  = screenY + 'px';
    splitNudge.style.top = screenY + 'px';
    splitLine.classList.add('visible');
    splitNudge.classList.add('visible');
  } else {
    splitLine.classList.remove('visible');
    splitNudge.classList.remove('visible');
  }
}

// ─── Split ratio persistence ──────────────────────────────
async function saveSplitRatio() {
  if (!pdfHash) return;
  try { await dbPut(STORE_SPLIT, pdfHash, splitRatios); } catch(e) {}
}

// Nudge split by N% of page height
function nudgeSplit(dir) {
  setSplitRatio(getSplitRatio() + dir * 0.01);
  applyHalfPageClip();
  saveSplitRatio();
}

// ─── Drag the split line ──────────────────────────────────
(function() {
  let dragging = false;
  let dragStartY = 0, dragStartRatio = 0;

  document.getElementById('split-line').addEventListener('pointerdown', e => {
    if (!halfPageMode) return;
    dragging = true;
    dragStartY     = e.clientY;
    dragStartRatio = getSplitRatio();
    document.getElementById('split-line').setPointerCapture(e.pointerId);
    e.stopPropagation(); e.preventDefault();
  }, { passive: false });

  document.addEventListener('pointermove', e => {
    if (!dragging) return;
    const canvasH = pdfCanvas.offsetHeight;
    if (canvasH === 0) return;
    const dy    = e.clientY - dragStartY;
    const delta = dy / canvasH;
    setSplitRatio(dragStartRatio + delta);
    applyHalfPageClip();
  });

  document.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    saveSplitRatio();
  });
})();

let nudgeVisible = false;

function toggleNudge() {
  if (!halfPageMode) return;
  nudgeVisible = !nudgeVisible;
  document.getElementById('tb-nudge').classList.toggle('active', nudgeVisible);
  applyHalfPageClip(); // re-apply to show/hide nudge
}

function toggleHalfPage() {
  if (!pdfDoc) return;
  halfPageMode = !halfPageMode;
  halfPageSide = 'top';
  if (!halfPageMode) { nudgeVisible = false; document.getElementById('tb-nudge').classList.remove('active'); }
  document.getElementById('tb-half').classList.toggle('active', halfPageMode);
  applyHalfPageClip();
  updateUI();
  if (halfPageMode) toast('Half-page on  ·  use split adjuster to reposition');
}

// Half-page navigation using a virtual index:
//   virtualIndex = (page - 1) * 2 + (side === 'bottom' ? 1 : 0)
//   page 1 top = 0, page 1 bottom = 1, page 2 top = 2, page 2 bottom = 3 ...
// This makes advance/retreat completely unambiguous with no stranded states.

function halfVirtualIndex() {
  return (currentPage - 1) * 2 + (halfPageSide === 'bottom' ? 1 : 0);
}

async function gotoHalfIndex(idx) {
  const maxIdx = totalPages * 2 - 1;
  if (idx < 0 || idx > maxIdx) return;
  const newPage = Math.floor(idx / 2) + 1;
  const newSide = idx % 2 === 0 ? 'top' : 'bottom';
  const pageChanged = newPage !== currentPage;
  currentPage  = newPage;
  halfPageSide = newSide;
  updateUI();
  if (pageChanged) { await renderPage(); redrawAnnotations(); }
  applyHalfPageClip();
}

async function halfPageAdvance() { await gotoHalfIndex(halfVirtualIndex() + 1); }
async function halfPageRetreat() { await gotoHalfIndex(halfVirtualIndex() - 1); }

// ═══════════════════════════════════════════════════════════
// ANNOTATION DRAWING
// ═══════════════════════════════════════════════════════════
function toNorm(clientX, clientY, canvas) {
  const rect = canvas.getBoundingClientRect();
  return { x: (clientX - rect.left) / rect.width, y: (clientY - rect.top) / rect.height };
}
function toPx(nx, ny, canvas) {
  return { x: nx * canvas.offsetWidth, y: ny * canvas.offsetHeight };
}

// Draw a fingering text annotation
function drawFingeringOn(ctx, canvas, ann, colorOverride) {
  const pos  = toPx(ann.x, ann.y, canvas);
  const size = Math.max(6, ann.size * strokeScale());
  ctx.save();
  ctx.font        = `900 ${size}px "Merriweather", "Georgia", serif`;
  ctx.fillStyle   = colorOverride || ann.color || '#2563eb';
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(ann.char, pos.x, pos.y);
  ctx.restore();
}

// Draw stroke onto a given ctx/canvas
function drawStrokeOn(ctx, canvas, stroke, colorOverride) {
  if (stroke.type === 'text') { drawFingeringOn(ctx, canvas, stroke, colorOverride); return; }
  if (!stroke.points || stroke.points.length < 2) return;
  ctx.save();
  if (stroke.isHl) {
    ctx.globalAlpha = HL_ALPHA;
    ctx.lineWidth   = Math.max(1, stroke.thickness * strokeScale() * HL_WIDTH_MULT);
  } else {
    ctx.globalAlpha = 1;
    ctx.lineWidth   = Math.max(0.5, stroke.thickness * strokeScale());
  }
  ctx.strokeStyle = colorOverride || stroke.color || '#2563eb';
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  const p0 = toPx(stroke.points[0].x, stroke.points[0].y, canvas);
  ctx.moveTo(p0.x, p0.y);
  for (let i = 1; i < stroke.points.length; i++) {
    const p = toPx(stroke.points[i].x, stroke.points[i].y, canvas);
    ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  ctx.restore();
}

// Full redraw of both canvases for current page
function redrawAnnotations() {
  const dpr = window.devicePixelRatio || 1;

  // Clear both
  hlCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  hlCtx.clearRect(0, 0, hlCanvas.offsetWidth, hlCanvas.offsetHeight);
  annCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  annCtx.clearRect(0, 0, annCanvas.offsetWidth, annCanvas.offsetHeight);

  const pageAnns = annotations[currentPage] || {};

  // Draw highlight layers first (bottom)
  for (const layer of layers.hl) {
    if (!layer.visible) continue;
    const strokes = pageAnns[layer.id] || [];
    for (const s of strokes) drawStrokeOn(hlCtx, hlCanvas, s, layer.color);
  }
  // Draw pen layers on top
  for (const layer of layers.pen) {
    if (!layer.visible) continue;
    const strokes = pageAnns[layer.id] || [];
    for (const s of strokes) drawStrokeOn(annCtx, annCanvas, s, layer.color);
  }
}

// ─── Active canvas/ctx for current mode ───────────────────
function activeDrawContext() {
  if (mode === 'hl')   return { ctx: hlCtx,  canvas: hlCanvas };
  return { ctx: annCtx, canvas: annCanvas };
}

// ─── Pointer events ───────────────────────────────────────
function activeCanvas() {
  return mode === 'hl' ? hlCanvas : annCanvas;
}

function setupCanvasPointer(canvas) {
  canvas.addEventListener('pointerdown', e => {
    if (e.pointerType === 'touch') return;
    if (mode !== 'draw' && mode !== 'hl' && mode !== 'erase' && mode !== 'finger') return;

    // Check active layer exists
    if (mode === 'draw' && activePenLayer < 0) {
      toast('Add a pen layer first.'); return;
    }
    if (mode === 'hl' && activeHlLayer < 0) {
      toast('Add a highlight layer first.'); return;
    }
    if (mode === 'finger' && activePenLayer < 0) {
      toast('Add a pen layer first.'); return;
    }

    // Fingering: capture touch point on pen-down, place on pen-up
    if (mode === 'finger') {
      if (e.button === 2 && fingerTouchNorm) {
        // Top barrel pressed while already touching — cycle forward
        cycleFingeringChar(1);
        e.preventDefault(); return;
      }
      if (e.button !== 0) return; // ignore other barrel-only events
      canvas.setPointerCapture(e.pointerId);
      fingerTouchNorm = toNorm(e.clientX, e.clientY, canvas);
      fingerPrevButtons = e.buttons;
      e.preventDefault();
      return;
    }

    canvas.setPointerCapture(e.pointerId);
    e.preventDefault();

    if (mode === 'draw' || mode === 'hl') {
      const isHl  = mode === 'hl';
      const layer = isHl ? layers.hl[activeHlLayer] : layers.pen[activePenLayer];
      const norm  = toNorm(e.clientX, e.clientY, canvas);
      currentStroke = {
        thickness: strokeThickness / currentScale(),
        color: layer.color,
        isHl,
        layerId: layer.id,
        points: [norm]
      };
    } else if (mode === 'erase') {
      eraseAt(e.clientX, e.clientY);
    }
  }, { passive: false });

  canvas.addEventListener('pointermove', e => {
    if (e.pointerType === 'touch') return;
    if (!e.buttons) return;

    // Finger mode: detect barrel button leading edge while pen is touching
    if (mode === 'finger' && fingerTouchNorm) {
      // Bottom barrel while touching: buttons goes from 1 (tip only) to 33 (tip+barrel)
      const bottomDown = (e.buttons & 32) && !(fingerPrevButtons & 32);
      if (bottomDown) cycleFingeringChar(1);
      fingerPrevButtons = e.buttons;
    }

    if ((mode === 'draw' || mode === 'hl') && currentStroke) {
      const { ctx, canvas: cv } = activeDrawContext();
      const norm = toNorm(e.clientX, e.clientY, cv);
      currentStroke.points.push(norm);
      const pts = currentStroke.points;
      const p1  = toPx(pts[pts.length-2].x, pts[pts.length-2].y, cv);
      const p2  = toPx(pts[pts.length-1].x, pts[pts.length-1].y, cv);
      ctx.save();
      if (currentStroke.isHl) {
        ctx.globalAlpha = HL_ALPHA;
        ctx.lineWidth   = Math.max(1, currentStroke.thickness * strokeScale() * HL_WIDTH_MULT);
      } else {
        ctx.globalAlpha = 1;
        ctx.lineWidth   = Math.max(0.5, currentStroke.thickness * strokeScale());
      }
      ctx.strokeStyle = currentStroke.color;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
      ctx.restore();
    } else if (mode === 'erase') {
      eraseAt(e.clientX, e.clientY);
    }
  });

  canvas.addEventListener('pointerup', async e => {
    if (e.pointerType === 'touch') return;

    // Finger mode: place number at captured touch point
    if (mode === 'finger' && fingerTouchNorm) {
      const layer = layers.pen[activePenLayer];
      const ann   = {
        type: 'text', char: activeFingeringChar,
        x: fingerTouchNorm.x, y: fingerTouchNorm.y,
        size: FINGERING_SIZE / currentScale(),
        color: layer.color, layerId: layer.id
      };
      const pg = currentPage;
      if (!annotations[pg]) annotations[pg] = {};
      if (!annotations[pg][layer.id]) annotations[pg][layer.id] = [];
      annotations[pg][layer.id].push(ann);
      undoStack.push({ page: pg, layerId: layer.id });
      updateUndoBtn();
      fingerTouchNorm = null;
      fingerPrevButtons = 0;
      await saveAnnotations();
      redrawAnnotations();
      return;
    }

    if ((mode === 'draw' || mode === 'hl') && currentStroke) {
      if (currentStroke.points.length >= 2) {
        const pg = currentPage;
        if (!annotations[pg]) annotations[pg] = {};
        const lid = currentStroke.layerId;
        if (!annotations[pg][lid]) annotations[pg][lid] = [];
        annotations[pg][lid].push(currentStroke);
        undoStack.push({ page: pg, layerId: lid });
        updateUndoBtn();
        await saveAnnotations();
      }
      currentStroke = null;
      redrawAnnotations();
    }
  });

  canvas.addEventListener('pointercancel', () => {
    currentStroke = null;
    fingerTouchNorm = null; fingerPrevButtons = 0;
    redrawAnnotations();
  });
}

setupCanvasPointer(annCanvas);
setupCanvasPointer(hlCanvas);

// ─── Eraser ───────────────────────────────────────────────
function eraseAt(clientX, clientY) {
  // Erase from active pen layer only (or all visible pen layers if none active)
  const pos  = toNorm(clientX, clientY, annCanvas);
  const pg   = annotations[currentPage];
  if (!pg) return;
  let changed = false;

  const targetLayers = activePenLayer >= 0
    ? [layers.pen[activePenLayer]]
    : layers.pen.filter(l => l.visible);

  for (const layer of targetLayers) {
    if (!pg[layer.id]) continue;
    const before = pg[layer.id].length;
    pg[layer.id] = pg[layer.id].filter(ann => {
      if (ann.type === 'text') {
        const dx = ann.x - pos.x, dy = ann.y - pos.y;
        return Math.sqrt(dx*dx + dy*dy) >= ERASE_RADIUS_NORM;
      }
      return !ann.points.some(pt => {
        const dx = pt.x - pos.x, dy = pt.y - pos.y;
        return Math.sqrt(dx*dx + dy*dy) < ERASE_RADIUS_NORM;
      });
    });
    if (pg[layer.id].length !== before) changed = true;
  }
  if (changed) { redrawAnnotations(); saveAnnotations(); }
}

// ─── Clear page ───────────────────────────────────────────
function updateUndoBtn() {
  const btn = document.getElementById('tb-undo');
  if (btn) btn.disabled = !pdfDoc || undoStack.length === 0;
}

async function undoLast() {
  if (!pdfDoc || undoStack.length === 0) return;
  const { page, layerId } = undoStack.pop();
  const pg = annotations[page];
  if (pg && pg[layerId] && pg[layerId].length > 0) {
    pg[layerId].pop();
    await saveAnnotations();
    if (page === currentPage) redrawAnnotations();
  }
  updateUndoBtn();
}

async function clearPage() {
  if (!pdfDoc) return;
  const pg = annotations[currentPage];
  if (!pg || Object.keys(pg).length === 0) { toast('No annotations on this page.'); return; }
  annotations[currentPage] = {};
  redrawAnnotations();
  await saveAnnotations();
  toast('Page annotations cleared.');
}

// ─── Persist ──────────────────────────────────────────────
async function saveAnnotations() {
  if (!pdfHash) return;
  try { await dbPut(STORE_ANN, pdfHash, annotations); }
  catch (e) { console.error('Failed to save annotations:', e); }
}
async function saveLayers() {
  if (!pdfHash) return;
  try { await dbPut(STORE_LAYERS, pdfHash, { layers, idCounter: layerIdCounter }); }
  catch (e) { console.error('Failed to save layers:', e); }
}

// ═══════════════════════════════════════════════════════════
// LAYER MANAGEMENT
// ═══════════════════════════════════════════════════════════
function addLayer() {
  const type = layerPanelTab;
  const arr  = layers[type];
  if (arr.length >= MAX_LAYERS) { toast(`Maximum ${MAX_LAYERS} ${type} layers reached.`); return; }

  const palette = type === 'hl' ? HL_PALETTE : PALETTE;
  const color   = palette[arr.length % palette.length];
  const id      = layerIdCounter++;
  const name    = type === 'pen' ? `Pen ${arr.length + 1}` : `Highlight ${arr.length + 1}`;
  arr.push({ id, name, color, visible: true });

  if (type === 'pen' && activePenLayer < 0) activePenLayer = 0;
  if (type === 'hl'  && activeHlLayer  < 0) activeHlLayer  = 0;

  saveLayers();
  renderLayerList();
  updateLayerDots();
}

function deleteLayer(type, idx) {
  const arr = layers[type];
  arr.splice(idx, 1);
  if (type === 'pen') activePenLayer = arr.length > 0 ? Math.min(activePenLayer, arr.length - 1) : -1;
  if (type === 'hl')  activeHlLayer  = arr.length > 0 ? Math.min(activeHlLayer,  arr.length - 1) : -1;
  saveLayers();
  redrawAnnotations();
  renderLayerList();
  updateLayerDots();
}

function toggleLayerVisibility(type, idx) {
  layers[type][idx].visible = !layers[type][idx].visible;
  saveLayers();
  redrawAnnotations();
  renderLayerList();
}

function setActiveLayer(type, idx) {
  if (type === 'pen') { activePenLayer = idx; setMode('draw'); }
  if (type === 'hl')  { activeHlLayer  = idx; setMode('hl'); }
  renderLayerList();
  updateLayerDots();
  closeLayersPanel();
}

function renameLayer(type, idx, newName) {
  layers[type][idx].name = newName || layers[type][idx].name;
  saveLayers(); renderLayerList();
}

function setLayerColor(type, idx, color) {
  layers[type][idx].color = color;
  saveLayers(); renderLayerList(); updateLayerDots();
  redrawAnnotations();
}

// ─── Layer list render ────────────────────────────────────
function renderLayerList() {
  const type = layerPanelTab;
  const arr  = layers[type];
  const list = document.getElementById('layer-list');
  const activeIdx = type === 'pen' ? activePenLayer : activeHlLayer;
  list.innerHTML = '';

  if (arr.length === 0) {
    list.innerHTML = '<div style="padding:20px 16px;color:var(--muted);font-size:0.82rem;text-align:center;">No layers yet. Add one below.</div>';
    return;
  }

  arr.forEach((layer, idx) => {
    const row = document.createElement('div');
    row.className = 'layer-row' + (idx === activeIdx ? ' active-layer' : '');

    // Color swatch
    const swatch = document.createElement('div');
    swatch.className = 'layer-swatch';
    swatch.style.background = layer.color;
    swatch.onclick = ev => { ev.stopPropagation(); openColorPicker(type, idx, swatch, layer.color); };

    // Name (double-tap to edit)
    const nameEl = document.createElement('span');
    nameEl.className = 'layer-name';
    nameEl.textContent = layer.name;
    let tapTimer = null;
    nameEl.addEventListener('click', () => {
      if (tapTimer) {
        clearTimeout(tapTimer); tapTimer = null;
        // Double tap — edit
        const input = document.createElement('input');
        input.className = 'layer-name-input';
        input.value = layer.name;
        input.maxLength = 24;
        nameEl.replaceWith(input);
        input.focus(); input.select();
        const commit = () => { renameLayer(type, idx, input.value.trim() || layer.name); };
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
      } else {
        tapTimer = setTimeout(() => { tapTimer = null; setActiveLayer(type, idx); }, 300);
      }
    });

    // Visibility toggle
    const vis = document.createElement('button');
    vis.className = 'layer-vis' + (layer.visible ? '' : ' hidden-layer');
    vis.innerHTML = layer.visible
      ? `<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    vis.onclick = ev => { ev.stopPropagation(); toggleLayerVisibility(type, idx); };

    // Delete
    const del = document.createElement('button');
    del.className = 'layer-del';
    del.innerHTML = `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    del.onclick = ev => { ev.stopPropagation(); deleteLayer(type, idx); };

    row.append(swatch, nameEl, vis, del);
    row.onclick = () => setActiveLayer(type, idx);
    list.appendChild(row);
  });
}

// ─── Color picker ─────────────────────────────────────────
let colorPickerTarget = null;

function openColorPicker(type, idx, anchorEl, currentColor) {
  const popup  = document.getElementById('color-picker-popup');
  const palette = type === 'hl' ? HL_PALETTE : PALETTE;
  popup.innerHTML = '';
  palette.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === currentColor ? ' selected' : '');
    sw.style.background = c;
    sw.onclick = () => {
      setLayerColor(type, idx, c);
      popup.classList.remove('open');
      colorPickerTarget = null;
    };
    popup.appendChild(sw);
  });

  const rect = anchorEl.getBoundingClientRect();
  popup.style.left = Math.min(rect.left, window.innerWidth - 180) + 'px';
  popup.style.top  = (rect.top - popup.offsetHeight - 8) + 'px';
  popup.classList.add('open');
  colorPickerTarget = popup;

  // Position after it's visible
  requestAnimationFrame(() => {
    const ph = popup.offsetHeight;
    popup.style.top = Math.max(8, rect.top - ph - 8) + 'px';
  });
}

document.addEventListener('pointerdown', e => {
  if (colorPickerTarget && !colorPickerTarget.contains(e.target)) {
    colorPickerTarget.classList.remove('open');
    colorPickerTarget = null;
  }
}, true);

// ─── Panel open/close ─────────────────────────────────────
function toggleLayersPanel() {
  const panel = document.getElementById('layers-panel');
  const back  = document.getElementById('layers-backdrop');
  if (panel.classList.contains('open')) {
    closeLayersPanel();
  } else {
    renderLayerList();
    panel.classList.add('open');
    back.classList.add('open');
  }
}

function closeLayersPanel() {
  document.getElementById('layers-panel').classList.remove('open');
  document.getElementById('layers-backdrop').classList.remove('open');
}

function switchTab(type) {
  layerPanelTab = type;
  document.getElementById('tab-pen').classList.toggle('active', type === 'pen');
  document.getElementById('tab-hl').classList.toggle('active', type === 'hl');
  renderLayerList();
}

// ═══════════════════════════════════════════════════════════
// MODE MANAGEMENT
// ═══════════════════════════════════════════════════════════
function setMode(newMode) {
  if (!pdfDoc) return;

  // Pan toggle: if already in pan, restore last draw mode
  if (newMode === 'pan' && mode === 'pan') {
    newMode = (['draw','hl'].includes(lastDrawMode)) ? lastDrawMode : 'none';
  } else if (newMode === mode) {
    newMode = 'none';
  }

  // Remember last drawing mode so pan can restore it
  if (['draw','hl'].includes(newMode)) lastDrawMode = newMode;

  const entering = ['draw','hl','erase','finger'].includes(newMode);
  if (entering) {
    viewer._frozenScrollLeft = viewer.scrollLeft;
    viewer._frozenScrollTop  = viewer.scrollTop;
  }

  mode = newMode;
  viewer.classList.toggle('draw-mode',   mode === 'draw');
  viewer.classList.toggle('hl-mode',     mode === 'hl');
  viewer.classList.toggle('erase-mode',  mode === 'erase');
  viewer.classList.toggle('finger-mode', mode === 'finger');
  viewer.classList.toggle('pan-mode',    mode === 'pan');

  if (entering) {
    viewer.scrollLeft = viewer._frozenScrollLeft;
    viewer.scrollTop  = viewer._frozenScrollTop;
  }

  document.getElementById('tb-draw').classList.toggle('active',        mode === 'draw');
  document.getElementById('tb-hl').classList.toggle('active',          mode === 'hl');
  document.getElementById('tb-erase').classList.toggle('active-danger', mode === 'erase');
  document.getElementById('tb-pan').classList.toggle('active',          mode === 'pan');
  document.getElementById('tb-finger').classList.toggle('active',       mode === 'finger');
  document.getElementById('fingering-palette').classList.toggle('visible', mode === 'finger');
}

// ═══════════════════════════════════════════════════════════
// THICKNESS
// ═══════════════════════════════════════════════════════════
function edgeNav(delta) {
  // Don't fire during drawing modes — pen input might graze the edge
  if (['draw','hl','erase'].includes(mode)) return;
  changePage(delta);
}

function toggleEdgeNav() {
  edgeNavEnabled = !edgeNavEnabled;
  document.getElementById('edge-prev').style.display = edgeNavEnabled ? '' : 'none';
  document.getElementById('edge-next').style.display = edgeNavEnabled ? '' : 'none';
  toast('Edge navigation ' + (edgeNavEnabled ? 'on' : 'off'));
}

function selectFingering(char) {
  activeFingeringChar = char;
  ['1','2','3','4','5'].forEach(n => {
    document.getElementById('fng-' + n).classList.toggle('active', n === char);
  });
}

// ─── Pen barrel button handling ──────────────────────────
// Barrel button 1 (lower) = e.button 1 on most Windows Ink pens
// Barrel button 2 (upper) = e.button 2
// We intercept these on pointerdown BEFORE the main handler to
// cycle fingering number or pen layer, consuming the event.

const FINGERING_CHARS = ['1','2','3','4','5'];

function doBarrelAction(dir) {
  if (mode === 'finger') {
    cycleFingeringChar(dir);
  } else {
    // Always cycle layer when a pen layer exists, regardless of mode
    cyclePenLayer(dir);
  }
}

function cycleFingeringChar(dir) {
  const idx = FINGERING_CHARS.indexOf(activeFingeringChar);
  const next = (idx + dir + FINGERING_CHARS.length) % FINGERING_CHARS.length;
  selectFingering(FINGERING_CHARS[next]);
  toast('Fingering: ' + FINGERING_CHARS[next], 900);
}

function cyclePenLayer(dir) {
  if (layers.pen.length === 0) { toast('No pen layers.', 900); return; }
  const next = (activePenLayer + dir + layers.pen.length) % layers.pen.length;
  activePenLayer = next;
  updateLayerDots();
  renderLayerList();
  toast('Layer: ' + layers.pen[next].name, 900);
}

// ─── Barrel button detection & handling ──────────────────
// Different pens/drivers report different e.button values.
// Run detectBarrelButtons() from console or tap the detect button
// to discover what your pen sends, then set them below.

let barrelBtn1 = null; // lower barrel button value (null = not yet detected)
let barrelBtn2 = null; // upper barrel button value
let barrelDetectMode = false;
const barrelLog = new Set();

function detectBarrelButtons() {
  barrelDetectMode = true;
  barrelLog.clear();
  toast('Press each barrel button on the score — watching for values…', 5000);
}

// Listen on every pointer event type to catch barrel buttons
// Some drivers fire pointerdown, others fire as buttons on pointermove
// Global barrel listeners
// Bottom barrel (buttons:32) while pen touching in draw/hl/erase:
// detect leading edge for layer cycling (finger mode handles its own)
let _prevPenButtons = 0;

document.addEventListener('pointermove', e => {
  if (e.pointerType !== 'pen') return;
  if (barrelDetectMode) {
    const info = `pointermove button:${e.button} buttons:${e.buttons}`;
    if (e.buttons > 0 && !barrelLog.has(info)) {
      barrelLog.add(info); toast(info, 4000); console.log('[Barrel]', info);
    }
    _prevPenButtons = e.buttons; return;
  }
  // Only handle draw/hl/erase here; finger mode handles its own barrel
  if (['draw','hl','erase'].includes(mode)) {
    const bottomDown = (e.buttons & 32) && !(_prevPenButtons & 32);
    if (bottomDown) cyclePenLayer(1);
  }
  _prevPenButtons = e.buttons;
}, true);

// Top barrel (button:2) cycles layer backward in draw/hl/erase,
// or fingering backward in finger mode
document.addEventListener('pointerdown', e => {
  if (e.pointerType !== 'pen') return;
  if (barrelDetectMode) {
    const info = `pointerdown button:${e.button} buttons:${e.buttons}`;
    if (!barrelLog.has(info)) {
      barrelLog.add(info); toast(info, 4000); console.log('[Barrel]', info);
    }
    return;
  }
  if (e.button === 2) {
    if (mode === 'finger') cycleFingeringChar(1);
    else if (['draw','hl','erase'].includes(mode)) cyclePenLayer(1);
    e.preventDefault(); e.stopPropagation();
  }
}, true);

// Suppress context menu triggered by top barrel button
document.addEventListener('contextmenu', e => {
  if (e.pointerType === 'pen' || e instanceof PointerEvent) {
    e.preventDefault();
  }
}, true);

function changeThickness(delta) {
  strokeThickness = Math.max(0.5, Math.min(20, Math.round((strokeThickness + delta) * 2) / 2));
  document.getElementById('thickness-val').textContent = strokeThickness;
}

// ═══════════════════════════════════════════════════════════
// PAGE NAVIGATION
// ═══════════════════════════════════════════════════════════
async function changePage(delta) {
  if (!pdfDoc) return;
  if (halfPageMode) {
    if (delta > 0) { await halfPageAdvance(); return; }
    else           { await halfPageRetreat(); return; }
  }
  const next = currentPage + delta;
  if (next < 1 || next > totalPages) return;
  currentPage = next;
  viewer.scrollTo(0, viewer.scrollHeight);
  updateUI();
  await renderPage();
  redrawAnnotations();
  applyHalfPageClip();
}

// ═══════════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════════
async function changeZoom(delta) {
  if (!pdfDoc) return;
  const nz = zoomLevel + delta;
  if (nz < ZOOM_MIN || nz > ZOOM_MAX) return;
  const cx = viewer.scrollLeft + viewer.clientWidth/2;
  const cy = viewer.scrollTop  + viewer.clientHeight/2;
  const oldW = pdfCanvas.offsetWidth || 1;
  const oldH = pdfCanvas.offsetHeight || 1;
  zoomLevel = nz; invalidateCache(); updateUI();
  await renderPage(); redrawAnnotations();
  applyHalfPageClip();
  viewer.scrollLeft = cx * (pdfCanvas.offsetWidth/oldW)  - viewer.clientWidth/2;
  viewer.scrollTop  = cy * (pdfCanvas.offsetHeight/oldH) - viewer.clientHeight/2;
}

async function fitToWidth() {
  if (!pdfDoc) return;
  await computeFitScale();
  zoomLevel = 0;
  await renderPage(); redrawAnnotations();
  applyHalfPageClip();
  viewer.scrollTo(0, viewer.scrollHeight);
  updateUI();
}

// ═══════════════════════════════════════════════════════════
// ROTATE
// ═══════════════════════════════════════════════════════════
async function rotatePage() {
  if (!pdfDoc) return;
  rotation = (rotation + 90) % 360;
  await computeFitScale(); zoomLevel = 0;
  await renderPage(); redrawAnnotations();
  applyHalfPageClip();
  viewer.scrollTo(0, viewer.scrollHeight); updateUI();
}

// ═══════════════════════════════════════════════════════════
// PAN
// ═══════════════════════════════════════════════════════════
viewer.addEventListener('pointerdown', e => {
  if (mode !== 'pan' || e.button !== 0) return;
  isPanning = true; panStartX = e.clientX; panStartY = e.clientY;
  panScrollX = viewer.scrollLeft; panScrollY = viewer.scrollTop;
  viewer.classList.add('is-panning');
  viewer.setPointerCapture(e.pointerId); e.preventDefault();
});
viewer.addEventListener('pointermove', e => {
  if (!isPanning) return;
  viewer.scrollLeft = panScrollX - (e.clientX - panStartX);
  viewer.scrollTop  = panScrollY - (e.clientY - panStartY);
});
viewer.addEventListener('pointerup',     () => { isPanning = false; viewer.classList.remove('is-panning'); });
viewer.addEventListener('pointercancel', () => { isPanning = false; viewer.classList.remove('is-panning'); });

// ═══════════════════════════════════════════════════════════
// FULLSCREEN
// ═══════════════════════════════════════════════════════════
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen().catch(()=>{});
}
document.addEventListener('fullscreenchange', () => {
  const isFs = !!document.fullscreenElement;
  document.getElementById('fs-icon-expand').style.display = isFs ? 'none' : '';
  document.getElementById('fs-icon-shrink').style.display = isFs ? ''     : 'none';
  if (pdfDoc) setTimeout(fitToWidth, 100);
});

// ═══════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════
function updateLayerDots() {
  const penDot = document.getElementById('pen-dot');
  const hlDot  = document.getElementById('hl-dot');
  penDot.style.background = (activePenLayer >= 0) ? layers.pen[activePenLayer].color : 'transparent';
  hlDot.style.background  = (activeHlLayer  >= 0) ? layers.hl[activeHlLayer].color  : 'transparent';
}

function updateUI() {
  const has = !!pdfDoc;
  const pct = Math.round(Math.pow(ZOOM_STEP, zoomLevel) * 100);
  zoomPill.textContent = has ? pct + '%' : '—';
  zoomPill.style.color = has ? 'var(--muted)' : '#333';

  // Page number pill — show "32a"/"32b" in half-page mode
  const pagePill = document.getElementById('page-pill');
  if (!has) {
    pagePill.textContent = '—';
  } else if (halfPageMode) {
    pagePill.textContent = currentPage + (halfPageSide === 'top' ? 'a' : 'b');
  } else {
    pagePill.textContent = currentPage + ' / ' + totalPages;
  }

  // In half-page mode prev/next are always enabled unless at absolute ends
  const atStart = halfPageMode ? (currentPage === 1 && halfPageSide === 'top') : currentPage <= 1;
  const atEnd   = halfPageMode ? (currentPage === totalPages && halfPageSide === 'bottom') : currentPage >= totalPages;
  document.getElementById('tb-prev').disabled    = !has || atStart;
  document.getElementById('tb-next').disabled    = !has || atEnd;
  document.getElementById('tb-zoom-out').disabled = !has || zoomLevel <= ZOOM_MIN;
  document.getElementById('tb-zoom-in').disabled  = !has || zoomLevel >= ZOOM_MAX;
  document.getElementById('tb-draw').disabled    = !has;
  document.getElementById('tb-hl').disabled      = !has;
  document.getElementById('tb-layers').disabled  = !has;
  document.getElementById('tb-erase').disabled   = !has;
  updateUndoBtn();
  document.getElementById('tb-pan').disabled     = !has;
  document.getElementById('tb-rotate').disabled  = !has;
  document.getElementById('tb-half').disabled    = !has;
  document.getElementById('tb-nudge').disabled   = !has;
  document.getElementById('tb-finger').disabled  = !has;
  zoomPill.disabled = !has;
}

// ═══════════════════════════════════════════════════════════
// TOAST / LOADING
// ═══════════════════════════════════════════════════════════
let toastTimer;
function toast(msg, duration = 2600) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}
function setLoading(show) { loadingEl.classList.toggle('hidden', !show); }

// ═══════════════════════════════════════════════════════════
// DRAG AND DROP
// ═══════════════════════════════════════════════════════════
let dragCounter = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; dragOverlay.classList.add('active'); });
document.addEventListener('dragleave', () => { if (--dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('active'); } });
document.addEventListener('dragover',  e => e.preventDefault());
document.addEventListener('drop', async e => {
  e.preventDefault(); dragCounter = 0; dragOverlay.classList.remove('active');
  const file = e.dataTransfer.files[0]; if (file) await openFile(file);
});

// ═══════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key) {
    case 'ArrowRight': case 'PageDown': changePage(1);  break;
    case 'ArrowLeft':  case 'PageUp':   changePage(-1); break;
    case '+': case '=': changeZoom(1);  break;
    case '-': case '_': changeZoom(-1); break;
    case 'w': case 'W': fitToWidth();   break;
    case 'r': case 'R': rotatePage();   break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'd': case 'D': if (pdfDoc) setMode('draw');  break;
    case 'h': case 'H': if (pdfDoc) setMode('hl');    break;
    case 'e': case 'E': if (pdfDoc) setMode('erase'); break;
    case 'p': case 'P': if (pdfDoc) setMode('pan');   break;
    case 'l': case 'L': if (pdfDoc) toggleLayersPanel(); break;
    case 'z': case 'Z': if (pdfDoc) undoLast();       break;
    case 'v': case 'V': if (pdfDoc) toggleHalfPage(); break;
    case 'n': case 'N': if (pdfDoc) setMode('finger'); break;
    case 'o': case 'O': document.getElementById('file-input').click(); break;
  }
});

// ═══════════════════════════════════════════════════════════
// RESIZE / ORIENTATION
// ═══════════════════════════════════════════════════════════
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(async () => { if (pdfDoc) { await fitToWidth(); redrawAnnotations(); applyHalfPageClip(); } }, 150);
});
screen.orientation?.addEventListener('change', () => {
  if (pdfDoc) setTimeout(async () => { await fitToWidth(); redrawAnnotations(); applyHalfPageClip(); }, 250);
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(async () => {
  try { db = await openDB(); }
  catch (e) { console.warn('IndexedDB unavailable:', e); }
  document.getElementById('thickness-val').textContent = strokeThickness;
  updateUI();
})();
</script>
