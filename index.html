<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#141414">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ScoreReader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #141414;
      --surface:   #1e1e1e;
      --border:    #2c2c2c;
      --muted:     #555;
      --text:      #c8c8c8;
      --accent:    #5b8cf7;
      --accent-h:  #7aaeff;
      --danger:    #e05c5c;
      --toolbar-h: 62px;
      --nav-w:     64px;
      --font-ui:   'IBM Plex Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ─── Viewer ──────────────────────────────────────────── */
    #viewer {
      flex: 1;
      position: relative;
      overflow: hidden;        /* default: no scroll, no pan */
      touch-action: none;      /* block OS-level scroll/pinch by default */
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    /* Pan mode re-enables scroll */
    #viewer.pan-mode {
      overflow: auto;
      touch-action: auto;
    }
    #viewer::-webkit-scrollbar       { width: 6px; height: 6px; }
    #viewer::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    #viewer-bg {
      position: fixed; inset: 0; bottom: var(--toolbar-h);
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.35; pointer-events: none; z-index: 0;
    }

    #scroll-inner {
      display: flex; flex-direction: column; align-items: center;
      min-height: 100%; width: max-content; min-width: 100%;
      padding: 16px 16px 0; position: relative; z-index: 1;
    }

    #scroll-spacer { flex: 1; min-height: 0; }

    /* ─── Canvas stack ────────────────────────────────────── */
    #canvas-wrap {
      position: relative;
      display: block;
      flex-shrink: 0;
    }

    /* PDF canvas — bottom of stack */
    #pdf-canvas {
      display: block;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 8px 40px rgba(0,0,0,0.7),
        0 2px 8px rgba(0,0,0,0.5);
    }

    /* Annotation canvas — exactly overlaid, pointer events controlled by mode */
    #ann-canvas {
      position: absolute;
      top: 0; left: 0;
      display: block;
      /* Default: pass all events through so scroll/pan work normally */
      pointer-events: none;
    }

    /* Draw mode: annotation canvas captures all pointer events */
    #viewer.draw-mode   #ann-canvas { pointer-events: auto; cursor: crosshair; }
    #viewer.erase-mode  #ann-canvas { pointer-events: auto; cursor: cell; }
    #viewer.pan-mode               { cursor: grab; }
    #viewer.pan-mode.is-panning    { cursor: grabbing; }

    /* Prevent browser hijacking pen strokes as scroll gestures */
    #ann-canvas { touch-action: none; }

    /* ─── Empty state ─────────────────────────────────────── */
    #empty-state {
      position: fixed; inset: 0; bottom: var(--toolbar-h); z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; pointer-events: none;
    }
    #empty-state > * { pointer-events: auto; }
    #empty-state.hidden { display: none; }

    .empty-icon  { font-size: 52px; opacity: 0.2; line-height: 1; }
    .empty-title { font-size: 1rem; color: var(--muted); letter-spacing: 0.02em; }
    .empty-hint  { font-size: 0.78rem; color: #333; letter-spacing: 0.02em; }

    #open-main-btn {
      background: var(--accent); color: #fff; border-radius: 8px;
      padding: 12px 28px; font-family: var(--font-ui); font-size: 0.9rem;
      font-weight: 500; cursor: pointer; letter-spacing: 0.03em;
      transition: background 0.15s, transform 0.1s; display: inline-block;
    }
    #open-main-btn:hover  { background: var(--accent-h); }
    #open-main-btn:active { transform: scale(0.97); }

    /* ─── Drag overlay ────────────────────────────────────── */
    #drag-overlay {
      position: fixed; inset: 0; bottom: var(--toolbar-h); z-index: 20;
      background: rgba(91,140,247,0.08); border: 2px dashed var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: var(--accent); letter-spacing: 0.04em;
      opacity: 0; pointer-events: none; transition: opacity 0.15s;
    }
    #drag-overlay.active { opacity: 1; pointer-events: auto; }

    /* ─── Loading ─────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0; bottom: var(--toolbar-h); z-index: 30;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px;
      background: rgba(20,20,20,0.75); backdrop-filter: blur(4px);
    }
    #loading.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    .loading-text { font-size: 0.82rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

    /* ─── Toolbar ─────────────────────────────────────────── */
    #toolbar {
      height: var(--toolbar-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: stretch; flex-shrink: 0; z-index: 100;
    }

    .nav-btn {
      width: var(--nav-w); flex-shrink: 0; background: none; border: none;
      color: var(--text); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: background 0.12s, color 0.12s;
      position: relative;
    }
    #tb-prev { border-right: 1px solid var(--border); }
    #tb-next { border-left:  1px solid var(--border); }
    .nav-btn svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .nav-btn:hover:not(:disabled)  { background: rgba(255,255,255,0.06); color: #fff; }
    .nav-btn:active:not(:disabled) { background: rgba(255,255,255,0.12); }
    .nav-btn:disabled               { color: #333; cursor: default; }

    #tb-center {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 2px; padding: 0 4px; overflow: hidden;
    }

    .tb-btn {
      background: none; border: none; color: var(--text);
      width: 38px; height: 42px; border-radius: 7px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s; flex-shrink: 0; position: relative;
    }
    .tb-btn svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    .tb-btn:hover:not(:disabled)  { background: rgba(255,255,255,0.07); color: #fff; }
    .tb-btn:active:not(:disabled) { background: rgba(255,255,255,0.12); }
    .tb-btn:disabled               { color: #333; cursor: default; }
    .tb-btn.active                 { color: var(--accent); }
    .tb-btn.active-danger          { color: var(--danger); }

    .tb-divider { width: 1px; height: 24px; background: var(--border); margin: 0 3px; flex-shrink: 0; }

    /* Thickness slider — hidden until pen mode active */
    #thickness-wrap {
      display: flex; align-items: center; gap: 4px;
      overflow: hidden; max-width: 0; opacity: 0;
      transition: max-width 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }
    #thickness-wrap.visible { max-width: 80px; opacity: 1; }

    #tb-thickness {
      -webkit-appearance: none; appearance: none;
      width: 60px; height: 3px;
      background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
    }
    #tb-thickness::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: var(--accent); border-radius: 50%; cursor: pointer;
    }
    #tb-thickness::-moz-range-thumb {
      width: 14px; height: 14px; background: var(--accent);
      border-radius: 50%; border: none; cursor: pointer;
    }

    /* Tooltips */
    .tb-btn::after, .nav-btn::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%); background: #2a2a2a;
      border: 1px solid var(--border); color: var(--text);
      font-size: 0.7rem; padding: 3px 7px; border-radius: 4px;
      white-space: nowrap; pointer-events: none; opacity: 0;
      transition: opacity 0.15s; z-index: 300;
    }
    .tb-btn:hover:not(:disabled)::after,
    .nav-btn:hover:not(:disabled)::after { opacity: 1; }

    /* ─── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: calc(var(--toolbar-h) + 12px); left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(30,30,30,0.95); border: 1px solid var(--border);
      color: var(--text); font-size: 0.8rem; padding: 8px 16px;
      border-radius: 6px; pointer-events: none; opacity: 0;
      transition: opacity 0.2s, transform 0.2s; z-index: 200;
      white-space: nowrap; letter-spacing: 0.02em;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="app">
  <div id="viewer">
    <div id="viewer-bg"></div>
    <div id="scroll-inner">
      <div id="scroll-spacer"></div>
      <div id="canvas-wrap">
        <canvas id="pdf-canvas"></canvas>
        <canvas id="ann-canvas"></canvas>
      </div>
    </div>
  </div>

  <div id="toolbar">
    <button class="nav-btn" id="tb-prev" data-tip="Prev (←)" onclick="changePage(-1)" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <div id="tb-center">
      <!-- Open -->
      <label class="tb-btn" for="file-input" data-tip="Open PDF (O)">
        <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
      </label>

      <div class="tb-divider"></div>

      <!-- Zoom -->
      <button class="tb-btn" id="tb-zoom-out" data-tip="Zoom Out (−)" onclick="changeZoom(-1)" disabled>
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="tb-btn" id="zoom-pill" data-tip="Reset Fit (W)" onclick="fitToWidth()"
        style="min-width:50px;font-family:var(--font-mono);font-size:0.72rem;color:var(--muted);" disabled>—</button>
      <button class="tb-btn" id="tb-zoom-in" data-tip="Zoom In (=)" onclick="changeZoom(1)" disabled>
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>

      <div class="tb-divider"></div>

      <!-- Draw -->
      <button class="tb-btn" id="tb-draw" data-tip="Draw (D)" onclick="setMode('draw')" disabled>
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>

      <!-- Thickness slider (visible in draw/erase mode) -->
      <div id="thickness-wrap">
        <input type="range" id="tb-thickness" min="1" max="20" value="3"
          oninput="onThicknessChange()" title="Stroke thickness">
      </div>

      <!-- Eraser -->
      <button class="tb-btn" id="tb-erase" data-tip="Eraser (E)" onclick="setMode('erase')" disabled>
        <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6.0 11.0 l7 7"/></svg>
      </button>

      <!-- Clear page annotations -->
      <button class="tb-btn" id="tb-clear" data-tip="Clear Page (X)" onclick="clearPage()" disabled>
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>

      <div class="tb-divider"></div>

      <!-- Pan -->
      <button class="tb-btn" id="tb-pan" data-tip="Pan (P)" onclick="setMode('pan')" disabled>
        <svg viewBox="0 0 24 24"><path d="M18 11V8a2 2 0 00-4 0v1a2 2 0 00-4 0V6a2 2 0 00-4 0v6l-1.5-2a1.5 1.5 0 00-2.5 1.5l3 5A6 6 0 0011 21h3a6 6 0 006-6v-3a1 1 0 00-2 0"/></svg>
      </button>

      <!-- Rotate -->
      <button class="tb-btn" id="tb-rotate" data-tip="Rotate (R)" onclick="rotatePage()" disabled>
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>

      <!-- Fullscreen -->
      <button class="tb-btn" id="tb-fs" data-tip="Fullscreen (F)" onclick="toggleFullscreen()">
        <svg viewBox="0 0 24 24" id="fs-icon-expand">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
        <svg viewBox="0 0 24 24" id="fs-icon-shrink" style="display:none">
          <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
          <line x1="10" y1="14" x2="3" y2="21"/><line x1="14" y1="10" x2="21" y2="3"/>
        </svg>
      </button>
    </div>

    <button class="nav-btn" id="tb-next" data-tip="Next (→)" onclick="changePage(1)" disabled>
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<div id="empty-state">
  <div class="empty-icon">𝄞</div>
  <p class="empty-title">No score loaded</p>
  <label id="open-main-btn" for="file-input">Open PDF Score</label>
  <p class="empty-hint">or drag a PDF into this window</p>
</div>

<div id="drag-overlay">Drop PDF to open</div>
<div id="loading" class="hidden">
  <div class="spinner"></div>
  <span class="loading-text">Loading Score…</span>
</div>

<input type="file" id="file-input" accept=".pdf,application/pdf" style="display:none" onchange="handleFileInput(event)">
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let pdfDoc      = null;
let currentPage = 1;
let totalPages  = 0;
let rotation    = 0;
let renderTask  = null;
let pdfHash     = null;   // content-hash key for IndexedDB

let fitScale  = 1;
let zoomLevel = 0;
const ZOOM_STEP = 1.25;
const ZOOM_MIN  = -4;
const ZOOM_MAX  =  8;
function currentScale() { return fitScale * Math.pow(ZOOM_STEP, zoomLevel); }

// ── Interaction mode: 'none' | 'draw' | 'erase' | 'pan' ──
let mode = 'none';

// ── Pan state ─────────────────────────────────────────────
let isPanning  = false;
let panStartX  = 0, panStartY  = 0;
let panScrollX = 0, panScrollY = 0;

// ── Annotation state ──────────────────────────────────────
// annotations[pageNum] = [ stroke, stroke, … ]
// stroke = { thickness, color, points: [{x,y}] }
//   x, y are NORMALIZED (0–1) relative to the PDF page dimensions at scale=1
// During drawing, currentStroke accumulates raw points then gets committed.
let annotations   = {};   // in-memory store
let currentStroke = null; // stroke being drawn right now
let strokeThickness = 2;  // px at fit-scale=1 (normalized on save); scales down as zoom increases

// ── Erase state ───────────────────────────────────────────
const ERASE_RADIUS_NORM = 0.015; // normalized radius for stroke erasure

// ═══════════════════════════════════════════════════════════
// ELEMENTS
// ═══════════════════════════════════════════════════════════
const pdfCanvas   = document.getElementById('pdf-canvas');
const pdfCtx      = pdfCanvas.getContext('2d');
const annCanvas   = document.getElementById('ann-canvas');
const annCtx      = annCanvas.getContext('2d');
const emptyState  = document.getElementById('empty-state');
const loadingEl   = document.getElementById('loading');
const zoomPill    = document.getElementById('zoom-pill');
const dragOverlay = document.getElementById('drag-overlay');
const viewer      = document.getElementById('viewer');

// ═══════════════════════════════════════════════════════════
// INDEXEDDB
// ═══════════════════════════════════════════════════════════
const DB_NAME    = 'ScoreReader';
const DB_VERSION = 1;
const STORE      = 'annotations';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function dbGet(key) {
  if (!db) return null;
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror   = () => reject(req.error);
  });
}

async function dbPut(key, value) {
  if (!db) return;
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

// ═══════════════════════════════════════════════════════════
// CONTENT HASH  (first 64 KB of file → SHA-1 hex)
// ═══════════════════════════════════════════════════════════
async function computeHash(arrayBuffer) {
  const sample = arrayBuffer.slice(0, 65536);
  const hashBuf = await crypto.subtle.digest('SHA-1', sample);
  return Array.from(new Uint8Array(hashBuf))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}

// ═══════════════════════════════════════════════════════════
// FILE LOADING
// ═══════════════════════════════════════════════════════════
async function handleFileInput(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (file) await openFile(file);
}

async function openFile(file) {
  if (file.type !== 'application/pdf' && !file.name.endsWith('.pdf')) {
    toast('Only PDF files are supported.');
    return;
  }
  setLoading(true);
  emptyState.classList.add('hidden');
  try {
    const ab    = await file.arrayBuffer();
    pdfHash     = await computeHash(ab);
    pdfDoc      = await pdfjsLib.getDocument({ data: ab }).promise;
    totalPages  = pdfDoc.numPages;
    currentPage = 1;
    rotation    = 0;
    zoomLevel   = 0;

    // Load saved annotations for this PDF
    const saved = await dbGet(pdfHash);
    annotations = saved || {};

    await computeFitScale();
    await renderPage();
    redrawAnnotations();
    updateUI();
    toast(`${file.name}  ·  ${totalPages} page${totalPages > 1 ? 's' : ''}`);
  } catch (err) {
    console.error(err);
    toast('Failed to load PDF.');
    emptyState.classList.remove('hidden');
  } finally {
    setLoading(false);
  }
}

// ═══════════════════════════════════════════════════════════
// FIT SCALE
// ═══════════════════════════════════════════════════════════
async function computeFitScale() {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(currentPage);
  const vp   = page.getViewport({ scale: 1, rotation });
  fitScale   = (viewer.clientWidth - 32) / vp.width;
}

// ═══════════════════════════════════════════════════════════
// RENDERING — PDF + annotation canvas sizing
// ═══════════════════════════════════════════════════════════
async function renderPage() {
  if (!pdfDoc) return;
  if (renderTask) { try { renderTask.cancel(); } catch {} renderTask = null; }

  const page     = await pdfDoc.getPage(currentPage);
  const scale    = currentScale();
  const dpr      = window.devicePixelRatio || 1;
  const viewport = page.getViewport({ scale, rotation });

  const cssW = Math.floor(viewport.width);
  const cssH = Math.floor(viewport.height);

  // PDF canvas
  pdfCanvas.width        = cssW * dpr;
  pdfCanvas.height       = cssH * dpr;
  pdfCanvas.style.width  = cssW + 'px';
  pdfCanvas.style.height = cssH + 'px';
  pdfCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Annotation canvas — same CSS size, same physical size
  annCanvas.width        = cssW * dpr;
  annCanvas.height       = cssH * dpr;
  annCanvas.style.width  = cssW + 'px';
  annCanvas.style.height = cssH + 'px';

  renderTask = page.render({ canvasContext: pdfCtx, viewport });
  try { await renderTask.promise; }
  catch (e) { if (e?.name !== 'RenderingCancelledException') console.error(e); }
  renderTask = null;
}

// ═══════════════════════════════════════════════════════════
// ANNOTATION DRAWING
// ═══════════════════════════════════════════════════════════

// Convert pointer event position → normalized page coords (0–1)
function toNorm(clientX, clientY) {
  const rect = annCanvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left)  / rect.width,
    y: (clientY - rect.top)   / rect.height
  };
}

// Convert normalized coords → canvas CSS pixels for drawing
function toPx(nx, ny) {
  return {
    x: nx * annCanvas.offsetWidth,
    y: ny * annCanvas.offsetHeight
  };
}

// Redraw all saved strokes for the current page onto annCanvas
function redrawAnnotations() {
  const dpr = window.devicePixelRatio || 1;
  annCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  annCtx.clearRect(0, 0, annCanvas.offsetWidth, annCanvas.offsetHeight);

  const strokes = annotations[currentPage] || [];
  for (const stroke of strokes) {
    drawStroke(stroke);
  }
}

// Draw a single stroke object onto annCanvas
function drawStroke(stroke) {
  if (!stroke.points || stroke.points.length < 2) return;
  const dpr = window.devicePixelRatio || 1;

  annCtx.save();
  annCtx.strokeStyle = stroke.color || '#2563eb';
  // Scale thickness: stored at fitScale=1, rendered at currentScale
  // Thickness stored normalized to fitScale. Render at fitScale but
  // divide by zoom factor so strokes get thinner as you zoom in.
  const zf1 = Math.pow(ZOOM_STEP, zoomLevel);
  annCtx.lineWidth   = Math.max(0.5, (stroke.thickness * fitScale) / zf1);
  annCtx.lineCap     = 'round';
  annCtx.lineJoin    = 'round';

  annCtx.beginPath();
  const p0 = toPx(stroke.points[0].x, stroke.points[0].y);
  annCtx.moveTo(p0.x, p0.y);
  for (let i = 1; i < stroke.points.length; i++) {
    const p = toPx(stroke.points[i].x, stroke.points[i].y);
    annCtx.lineTo(p.x, p.y);
  }
  annCtx.stroke();
  annCtx.restore();
}

// Draw the in-progress currentStroke incrementally (last two points)
function drawStrokeIncremental(stroke) {
  if (!stroke.points || stroke.points.length < 2) return;
  const pts = stroke.points;
  const p1  = toPx(pts[pts.length - 2].x, pts[pts.length - 2].y);
  const p2  = toPx(pts[pts.length - 1].x, pts[pts.length - 1].y);

  annCtx.save();
  annCtx.strokeStyle = stroke.color || '#2563eb';
  const zf2 = Math.pow(ZOOM_STEP, zoomLevel);
  annCtx.lineWidth   = Math.max(0.5, (stroke.thickness * fitScale) / zf2);
  annCtx.lineCap     = 'round';
  annCtx.lineJoin    = 'round';
  annCtx.beginPath();
  annCtx.moveTo(p1.x, p1.y);
  annCtx.lineTo(p2.x, p2.y);
  annCtx.stroke();
  annCtx.restore();
}

// ─── Pointer events on the annotation canvas ──────────────
annCanvas.addEventListener('pointerdown', e => {
  // Only respond to pen or (in draw/erase mode) primary touch/mouse
  // Touch is deliberately ignored so fingers can scroll
  if (e.pointerType === 'touch') return;
  if (mode !== 'draw' && mode !== 'erase') return;

  annCanvas.setPointerCapture(e.pointerId);
  e.preventDefault();

  if (mode === 'draw') {
    const norm = toNorm(e.clientX, e.clientY);
    currentStroke = {
      thickness: strokeThickness / fitScale,  // normalized: rendered width = thickness*fitScale/zoomFactor
      color: '#2563eb',
      points: [norm]
    };
  } else if (mode === 'erase') {
    eraseAt(e.clientX, e.clientY);
  }
}, { passive: false });

annCanvas.addEventListener('pointermove', e => {
  if (e.pointerType === 'touch') return;
  if (!e.buttons) return;

  if (mode === 'draw' && currentStroke) {
    const norm = toNorm(e.clientX, e.clientY);
    currentStroke.points.push(norm);
    drawStrokeIncremental(currentStroke);
  } else if (mode === 'erase') {
    eraseAt(e.clientX, e.clientY);
  }
});

annCanvas.addEventListener('pointerup', async e => {
  if (e.pointerType === 'touch') return;
  if (mode === 'draw' && currentStroke) {
    if (currentStroke.points.length >= 2) {
      if (!annotations[currentPage]) annotations[currentPage] = [];
      annotations[currentPage].push(currentStroke);
      await saveAnnotations();
    }
    currentStroke = null;
  }
});

annCanvas.addEventListener('pointercancel', () => {
  currentStroke = null;
});

// ─── Eraser ───────────────────────────────────────────────
function eraseAt(clientX, clientY) {
  const pos = toNorm(clientX, clientY);
  const page = annotations[currentPage];
  if (!page) return;

  const before = page.length;
  // Remove any stroke that has a point within ERASE_RADIUS_NORM of pos
  annotations[currentPage] = page.filter(stroke => {
    return !stroke.points.some(pt => {
      const dx = pt.x - pos.x;
      const dy = pt.y - pos.y;
      return Math.sqrt(dx*dx + dy*dy) < ERASE_RADIUS_NORM;
    });
  });

  if (annotations[currentPage].length !== before) {
    redrawAnnotations();
    saveAnnotations();
  }
}

// ─── Clear page ───────────────────────────────────────────
async function clearPage() {
  if (!pdfDoc) return;
  if (!annotations[currentPage] || annotations[currentPage].length === 0) {
    toast('No annotations on this page.');
    return;
  }
  annotations[currentPage] = [];
  redrawAnnotations();
  await saveAnnotations();
  toast('Page annotations cleared.');
}

// ─── Persist ──────────────────────────────────────────────
async function saveAnnotations() {
  if (!pdfHash) return;
  try {
    await dbPut(pdfHash, annotations);
  } catch (e) {
    console.error('Failed to save annotations:', e);
  }
}

// ═══════════════════════════════════════════════════════════
// MODE MANAGEMENT
// ═══════════════════════════════════════════════════════════
function setMode(newMode) {
  if (!pdfDoc) return;
  // Toggle off if already active
  if (mode === newMode) newMode = 'none';

  // Freeze scroll position before entering draw/erase so the page
  // doesn't shift under the pen. Restore it on exit.
  const entering = (newMode === 'draw' || newMode === 'erase');
  const leaving  = (mode  === 'draw' || mode  === 'erase') && !entering;

  if (entering) {
    // Capture current scroll so we can lock the viewer in place
    viewer._frozenScrollLeft = viewer.scrollLeft;
    viewer._frozenScrollTop  = viewer.scrollTop;
  }

  mode = newMode;

  viewer.classList.toggle('draw-mode',  mode === 'draw');
  viewer.classList.toggle('erase-mode', mode === 'erase');
  viewer.classList.toggle('pan-mode',   mode === 'pan');

  // After CSS overflow:hidden is applied, the scroll position resets to 0.
  // Immediately re-apply the frozen position so the view doesn't jump.
  if (entering) {
    viewer.scrollLeft = viewer._frozenScrollLeft;
    viewer.scrollTop  = viewer._frozenScrollTop;
  }

  document.getElementById('tb-draw').classList.toggle('active',        mode === 'draw');
  document.getElementById('tb-erase').classList.toggle('active-danger', mode === 'erase');
  document.getElementById('tb-pan').classList.toggle('active',          mode === 'pan');

  // Show thickness slider in draw or erase mode
  document.getElementById('thickness-wrap').classList.toggle('visible',
    mode === 'draw' || mode === 'erase');
}

function onThicknessChange() {
  strokeThickness = parseInt(document.getElementById('tb-thickness').value, 10);
}

// ═══════════════════════════════════════════════════════════
// PAGE NAVIGATION
// ═══════════════════════════════════════════════════════════
async function changePage(delta) {
  if (!pdfDoc) return;
  const next = currentPage + delta;
  if (next < 1 || next > totalPages) return;
  currentPage = next;
  viewer.scrollTo(0, viewer.scrollHeight);
  updateUI();
  await renderPage();
  redrawAnnotations();
}

// ═══════════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════════
async function changeZoom(delta) {
  if (!pdfDoc) return;
  const nz = zoomLevel + delta;
  if (nz < ZOOM_MIN || nz > ZOOM_MAX) return;

  const cx   = viewer.scrollLeft + viewer.clientWidth  / 2;
  const cy   = viewer.scrollTop  + viewer.clientHeight / 2;
  const oldW = pdfCanvas.offsetWidth  || 1;
  const oldH = pdfCanvas.offsetHeight || 1;

  zoomLevel = nz;
  updateUI();
  await renderPage();
  redrawAnnotations();

  const newW = pdfCanvas.offsetWidth;
  const newH = pdfCanvas.offsetHeight;
  viewer.scrollLeft = cx * (newW / oldW) - viewer.clientWidth  / 2;
  viewer.scrollTop  = cy * (newH / oldH) - viewer.clientHeight / 2;
}

async function fitToWidth() {
  if (!pdfDoc) return;
  await computeFitScale();
  zoomLevel = 0;
  await renderPage();
  redrawAnnotations();
  viewer.scrollTo(0, viewer.scrollHeight);
  updateUI();
}

// ═══════════════════════════════════════════════════════════
// ROTATE
// ═══════════════════════════════════════════════════════════
async function rotatePage() {
  if (!pdfDoc) return;
  rotation = (rotation + 90) % 360;
  await computeFitScale();
  zoomLevel = 0;
  await renderPage();
  redrawAnnotations();
  viewer.scrollTo(0, viewer.scrollHeight);
  updateUI();
}

// ═══════════════════════════════════════════════════════════
// PAN (pointer drag on viewer — only fires when mode=pan)
// ═══════════════════════════════════════════════════════════
viewer.addEventListener('pointerdown', e => {
  if (mode !== 'pan' || e.button !== 0) return;
  isPanning  = true;
  panStartX  = e.clientX; panStartY  = e.clientY;
  panScrollX = viewer.scrollLeft; panScrollY = viewer.scrollTop;
  viewer.classList.add('is-panning');
  viewer.setPointerCapture(e.pointerId);
  e.preventDefault();
});
viewer.addEventListener('pointermove', e => {
  if (!isPanning) return;
  viewer.scrollLeft = panScrollX - (e.clientX - panStartX);
  viewer.scrollTop  = panScrollY - (e.clientY - panStartY);
});
viewer.addEventListener('pointerup',     () => { isPanning = false; viewer.classList.remove('is-panning'); });
viewer.addEventListener('pointercancel', () => { isPanning = false; viewer.classList.remove('is-panning'); });

// ═══════════════════════════════════════════════════════════
// FULLSCREEN
// ═══════════════════════════════════════════════════════════
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen().catch(() => {});
}
document.addEventListener('fullscreenchange', () => {
  const isFs = !!document.fullscreenElement;
  document.getElementById('fs-icon-expand').style.display = isFs ? 'none' : '';
  document.getElementById('fs-icon-shrink').style.display = isFs ? ''     : 'none';
  document.getElementById('tb-fs').dataset.tip = isFs ? 'Exit Fullscreen (F)' : 'Fullscreen (F)';
  if (pdfDoc) setTimeout(fitToWidth, 100);
});

// ═══════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════
function updateUI() {
  const has = !!pdfDoc;
  const pct = Math.round(Math.pow(ZOOM_STEP, zoomLevel) * 100);
  zoomPill.textContent = has ? pct + '%' : '—';
  zoomPill.style.color = has ? 'var(--muted)' : '#333';

  document.getElementById('tb-prev').disabled     = !has || currentPage <= 1;
  document.getElementById('tb-next').disabled     = !has || currentPage >= totalPages;
  document.getElementById('tb-zoom-out').disabled  = !has || zoomLevel <= ZOOM_MIN;
  document.getElementById('tb-zoom-in').disabled   = !has || zoomLevel >= ZOOM_MAX;
  document.getElementById('tb-draw').disabled      = !has;
  document.getElementById('tb-erase').disabled     = !has;
  document.getElementById('tb-clear').disabled     = !has;
  document.getElementById('tb-pan').disabled       = !has;
  document.getElementById('tb-rotate').disabled    = !has;
  zoomPill.disabled = !has;
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
let toastTimer;
function toast(msg, duration = 2600) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}
function setLoading(show) { loadingEl.classList.toggle('hidden', !show); }

// ═══════════════════════════════════════════════════════════
// DRAG AND DROP
// ═══════════════════════════════════════════════════════════
let dragCounter = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; dragOverlay.classList.add('active'); });
document.addEventListener('dragleave', () => { if (--dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('active'); } });
document.addEventListener('dragover',  e => e.preventDefault());
document.addEventListener('drop', async e => {
  e.preventDefault(); dragCounter = 0; dragOverlay.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) await openFile(file);
});

// ═══════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key) {
    case 'ArrowRight': case 'PageDown': changePage(1);     break;
    case 'ArrowLeft':  case 'PageUp':   changePage(-1);    break;
    case '+': case '=':                 changeZoom(1);     break;
    case '-': case '_':                 changeZoom(-1);    break;
    case 'w': case 'W':                 fitToWidth();      break;
    case 'r': case 'R':                 rotatePage();      break;
    case 'f': case 'F':                 toggleFullscreen(); break;
    case 'd': case 'D': if (pdfDoc)     setMode('draw');   break;
    case 'e': case 'E': if (pdfDoc)     setMode('erase');  break;
    case 'p': case 'P': if (pdfDoc)     setMode('pan');    break;
    case 'x': case 'X': if (pdfDoc)     clearPage();       break;
    case 'o': case 'O': document.getElementById('file-input').click(); break;
  }
});

// ═══════════════════════════════════════════════════════════
// RESIZE / ORIENTATION
// ═══════════════════════════════════════════════════════════
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(async () => {
    if (!pdfDoc) return;
    await fitToWidth();
    redrawAnnotations();
  }, 150);
});
screen.orientation?.addEventListener('change', () => {
  if (pdfDoc) setTimeout(async () => { await fitToWidth(); redrawAnnotations(); }, 250);
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(async () => {
  try { db = await openDB(); }
  catch (e) { console.warn('IndexedDB unavailable, annotations will not persist:', e); }
  updateUI();
})();
</script>
